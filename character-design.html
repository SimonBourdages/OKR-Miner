<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:#12122a;--card-hover:#1a1a3a;--accent:#00ff88;--accent-dim:#00cc6a;--text:#e0e0e0;--text-dim:#888;--border:#222240;--selected:#00ff8833;--gold:#ffd700;--danger:#ff4466;--blue:#4488ff}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 50%,#0a1a2f 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,#0f1a0f 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,#1a0a2a 0%,transparent 50%)}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px 30px 60px}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:2.8em;font-weight:800;background:linear-gradient(135deg,var(--accent),#88ffcc,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;text-shadow:0 0 40px #00ff8844}
header p{color:var(--text-dim);font-size:1.1em;margin-top:8px;letter-spacing:1px}
.entity-section{margin:40px 0;padding:30px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 30px #00000066}
.entity-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.entity-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4em;flex-shrink:0}
.entity-header h2{font-size:1.5em;font-weight:700;color:var(--accent)}
.entity-header .role{color:var(--text-dim);font-size:.9em;margin-left:8px;font-weight:400}
.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.option-card{background:#0e0e22;border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .25s ease;position:relative;display:flex;flex-direction:column;align-items:center;gap:8px}
.option-card:hover{border-color:var(--accent-dim);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 6px 20px #00ff8818}
.option-card.selected{border-color:var(--accent);background:var(--selected);box-shadow:0 0 20px #00ff8833}
.option-card.selected::after{content:'';position:absolute;top:8px;right:10px;color:var(--accent);font-size:1.2em;font-weight:bold}
.option-card canvas{border-radius:6px;background:#080818;image-rendering:pixelated}
.option-card .name{font-weight:600;font-size:.85em;color:#fff;text-align:center}
.option-card .desc{font-size:.72em;color:var(--text-dim);text-align:center;line-height:1.3}
.output-section{margin-top:50px;padding:30px;background:var(--card);border:1px solid var(--border);border-radius:16px;text-align:center}
.output-section h2{color:var(--accent);margin-bottom:16px;font-size:1.6em}
.btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,var(--accent),#00cc88);color:#000;font-weight:700;font-size:1em;border:none;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #00ff8844}
.btn:active{transform:translateY(0)}
.output-box{margin-top:16px;background:#080818;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'Cascadia Code','Consolas',monospace;font-size:.85em;color:var(--accent);word-break:break-all;text-align:left;display:none;position:relative}
.output-box.visible{display:block}
.copy-btn{position:absolute;top:8px;right:8px;padding:6px 14px;background:var(--accent);color:#000;border:none;border-radius:4px;font-weight:600;font-size:.75em;cursor:pointer}
.copy-btn:hover{background:#fff}
.selection-count{margin-top:10px;color:var(--text-dim);font-size:.9em}
.nav-bar{position:sticky;top:0;z-index:100;background:#0a0a14ee;backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:10px}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:1400px;margin:0 auto;padding:0 20px}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:.75em;padding:4px 10px;border-radius:4px;border:1px solid transparent;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--accent);background:#00ff8811}
</style>

// ===== STARS BACKGROUND =====
(function createStars(){
  const c = document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';

// ===== BUILD SECTIONS =====
const sectionsEl = document.getElementById('sections');
ENTITIES.forEach(ent => {
  const sec = document.createElement('div');
  sec.className = 'entity-section';
  sec.id = ent.id;
  const isLeadership = ent.id === 'leadership';
  sec.innerHTML = `
    <div class="entity-header">
      <div class="entity-icon" style="background:${ent.color}22;border:1px solid ${ent.color}44">${ent.icon}</div>
      <h2>${ent.name}<span class="role">  ${ent.role}</span></h2>
    </div>
    <div class="options-grid" id="grid-${ent.id}"></div>`;
  sectionsEl.appendChild(sec);
  const grid = sec.querySelector('.options-grid');
  ent.options.forEach((opt,oi) => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.dataset.entity = ent.id;
    card.dataset.option = opt.id;
    const cw = isLeadership ? 320 : 80;
    const ch = 80;
    card.innerHTML = `<canvas width="${cw}" height="${ch}" style="width:${cw}px;height:${ch}px"></canvas>
      <div class="name">${opt.name}</div><div class="desc">${opt.desc}</div>`;
    card.addEventListener('click', () => selectOption(ent.id, opt.id, card));
    grid.appendChild(card);
    canvases.push({canvas:card.querySelector('canvas'),entity:ent.id,option:opt.id,index:oi,color:ent.color,isLeadership});
  });
});

function selectOption(entityId, optionId, card){
  document.querySelectorAll(`.option-card[data-entity="${entityId}"]`).forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  selections[entityId] = optionId;
  updateCount();
}
function updateCount(){
  const n = Object.keys(selections).length;
  document.getElementById('selCount').textContent = `${n} / 10 entities selected`;
}
function generateOutput(){
  const box = document.getElementById('outputBox');
  const txt = document.getElementById('outputText');
  const cmd = 'APPLY_DESIGNS: ' + JSON.stringify(selections);
  txt.textContent = cmd;
  box.classList.add('visible');
}
function copyOutput(){
  const t = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b = document.querySelector('.copy-btn');
    b.textContent='COPIED!';setTimeout(()=>b.textContent='COPY',1500);
  });
}
// ===== PIXEL ART DRAWING FUNCTIONS =====
const T = performance.now.bind(performance);
function px(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function circ(ctx,x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function glow(ctx,x,y,r,c){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function tri(ctx,x,y,s,c,rot=0){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.866,s*.5);ctx.lineTo(-s*.866,s*.5);ctx.closePath();ctx.fill();ctx.restore();}
function hexColor(c,a){return c+(Math.round(a*255)).toString(16).padStart(2,'0');}
function pulse(t,speed=1){return .5+.5*Math.sin(t*speed);}
function dim(c,f){
  const m=c.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i);
  if(!m)return c;
  const r=Math.min(255,Math.round(parseInt(m[1],16)*f));
  const g=Math.min(255,Math.round(parseInt(m[2],16)*f));
  const b=Math.min(255,Math.round(parseInt(m[3],16)*f));
  return `rgb(${r},${g},${b})`;
}

      (cx)=>{px(ctx,cx-18,20,36,32,'#779');px(ctx,cx-26,30,52,6,'#99b');px(ctx,cx-26,38,52,6,'#88a');circ(ctx,cx,25,4,'#0f8');for(let i=-2;i<=2;i++)circ(ctx,cx+i*8,44,2,dim('#0f8',pulse(t,1+i*.2)));px(ctx,cx-4,16,8,4,'#bbf');},
      (cx)=>{px(ctx,cx-24,16,48,40,'#88a');px(ctx,cx-32,28,64,8,'#99c');px(ctx,cx-32,40,64,8,'#88b');ctx.strokeStyle='#0f8';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(cx,36,30,14,0,0,Math.PI*2);ctx.stroke();for(let i=-3;i<=3;i++)circ(ctx,cx+i*7,22,2,dim('#0f8',pulse(t,.8+i*.15)));glow(ctx,cx,32,20,hexColor('#00ff88',pulse(t)*.3));px(ctx,cx-5,12,10,4,'#ccf');}
    ];stages.forEach((fn,i)=>fn(i*80+40));
  },
  'command-bridge':(ctx,t)=>{
    const stages=[

      (cx)=>{px(ctx,cx-22,18,44,40,'#334');px(ctx,cx-20,20,40,2,'#557');for(let i=0;i<3;i++)px(ctx,cx-14+i*10,28,6,10,'#0af');circ(ctx,cx-10,50,2,dim('#0f8',pulse(t)));},
      (cx)=>{px(ctx,cx-26,14,52,44,'#445');px(ctx,cx-24,16,48,2,'#668');for(let i=0;i<5;i++)px(ctx,cx-20+i*9,24,6,12,dim('#0af',pulse(t,.8+i*.1)));for(let i=0;i<3;i++)circ(ctx,cx-12+i*12,46,3,'#0f8');},
      (cx)=>{px(ctx,cx-30,10,60,50,'#556');px(ctx,cx-28,12,56,2,'#779');for(let i=0;i<7;i++)px(ctx,cx-24+i*7,20,5,14,dim('#0af',pulse(t,.7+i*.08)));for(let i=0;i<6;i++)circ(ctx,cx-20+i*8,44,3,dim('#0f8',pulse(t,1+i*.1)));glow(ctx,cx,36,24,hexColor('#00aaff',pulse(t)*.2));}
    ];stages.forEach((fn,i)=>fn(i*80+40));
  },
  'mothership':(ctx,t)=>{

// ===== ANIMATION LOOP =====
function drawAll(t){
  canvases.forEach(item=>{
    const {canvas,entity,option,index,color,isLeadership} = item;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(isLeadership){
      const drawer = leadershipDrawers[option];
      if(drawer) drawer(ctx,t);
      // stage labels
      ctx.fillStyle='#ffffff55';ctx.font='7px Segoe UI';
      ['Lv1','Lv5','Lv10','Lv15'].forEach((lbl,i)=>ctx.fillText(lbl,i*80+28,74));
    } else {
      const drawer = entityDrawers[entity]?.[option];
      if(drawer) drawer(ctx,t,color);
    }
  });
  animFrame = requestAnimationFrame(drawAll);
}
requestAnimationFrame(drawAll);
