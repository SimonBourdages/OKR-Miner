<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dominos - Test Suite</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        #test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .test-section {
            background: #2a2a2a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .test-section h2 {
            margin-top: 0;
            color: #ffff00;
        }
        .test-case {
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #666;
            background: #333;
        }
        .test-case.pass {
            border-left-color: #00ff00;
            background: #1a3a1a;
        }
        .test-case.fail {
            border-left-color: #ff0000;
            background: #3a1a1a;
        }
        .test-case.running {
            border-left-color: #ffff00;
            background: #3a3a1a;
        }
        .test-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .test-result {
            font-size: 14px;
            margin-left: 20px;
        }
        .test-error {
            color: #ff6666;
            margin-left: 20px;
            font-size: 12px;
        }
        .summary {
            background: #2a2a2a;
            border: 3px solid #00ffff;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .summary h2 {
            margin: 0 0 15px 0;
            color: #00ffff;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
        }
        .stat {
            font-size: 24px;
        }
        .stat.pass { color: #00ff00; }
        .stat.fail { color: #ff0000; }
        .stat.total { color: #ffff00; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px;
        }
        button:hover {
            background: #00ffff;
        }
        #test-canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div id="test-container">
        <h1>🎮 TEAM DOMINOS TEST SUITE 🎮</h1>
        
        <div class="summary" id="summary">
            <h2>Test Summary</h2>
            <div class="stats">
                <div class="stat total">Total: <span id="total-tests">0</span></div>
                <div class="stat pass">✓ Passed: <span id="passed-tests">0</span></div>
                <div class="stat fail">✗ Failed: <span id="failed-tests">0</span></div>
            </div>
            <button onclick="runAllTests()">▶ Run All Tests</button>
            <button onclick="runCriticalTests()">⚡ Run Critical Tests</button>
        </div>

        <div class="test-section" id="rendering-tests">
            <h2>🎨 Rendering Tests</h2>
        </div>

        <div class="test-section" id="gameplay-tests">
            <h2>🎮 Gameplay Tests</h2>
        </div>

        <div class="test-section" id="physics-tests">
            <h2>⚙️ Physics Tests</h2>
        </div>

        <div class="test-section" id="phase-tests">
            <h2>🔄 Phase Transition Tests</h2>
        </div>

        <div class="test-section" id="integration-tests">
            <h2>🔗 Integration Tests</h2>
        </div>
    </div>

    <canvas id="test-canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class TestRunner {
            constructor() {
                this.tests = [];
                this.results = {
                    total: 0,
                    passed: 0,
                    failed: 0
                };
                this.canvas = document.getElementById('test-canvas');
            }

            addTest(name, category, critical, testFunc) {
                this.tests.push({
                    name,
                    category,
                    critical,
                    func: testFunc
                });
            }

            async runTest(test) {
                const container = document.getElementById(`${test.category}-tests`);
                const testCase = document.createElement('div');
                testCase.className = 'test-case running';
                testCase.innerHTML = `
                    <div class="test-name">⚙️ ${test.name}</div>
                    <div class="test-result">Running...</div>
                `;
                container.appendChild(testCase);

                try {
                    const result = await test.func();
                    if (result.pass) {
                        testCase.className = 'test-case pass';
                        testCase.innerHTML = `
                            <div class="test-name">✓ ${test.name}</div>
                            <div class="test-result">${result.message || 'Passed'}</div>
                        `;
                        this.results.passed++;
                        return true;
                    } else {
                        throw new Error(result.message || 'Test failed');
                    }
                } catch (error) {
                    testCase.className = 'test-case fail';
                    testCase.innerHTML = `
                        <div class="test-name">✗ ${test.name}</div>
                        <div class="test-error">Error: ${error.message}</div>
                    `;
                    this.results.failed++;
                    return false;
                }
            }

            async runAllTests() {
                this.clearResults();
                this.results.total = this.tests.length;
                
                for (const test of this.tests) {
                    await this.runTest(test);
                    await this.delay(100);
                }
                
                this.updateSummary();
            }

            async runCriticalTests() {
                this.clearResults();
                const criticalTests = this.tests.filter(t => t.critical);
                this.results.total = criticalTests.length;
                
                for (const test of criticalTests) {
                    await this.runTest(test);
                    await this.delay(100);
                }
                
                this.updateSummary();
            }

            clearResults() {
                this.results = { total: 0, passed: 0, failed: 0 };
                ['rendering', 'gameplay', 'physics', 'phase', 'integration'].forEach(category => {
                    const container = document.getElementById(`${category}-tests`);
                    container.querySelectorAll('.test-case').forEach(el => el.remove());
                });
            }

            updateSummary() {
                document.getElementById('total-tests').textContent = this.results.total;
                document.getElementById('passed-tests').textContent = this.results.passed;
                document.getElementById('failed-tests').textContent = this.results.failed;
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        const runner = new TestRunner();

        // ===== RENDERING TESTS =====
        runner.addTest(
            'Three.js library loads correctly',
            'rendering',
            true,
            async () => {
                if (typeof THREE === 'undefined') {
                    return { pass: false, message: 'THREE is not defined' };
                }
                return { pass: true, message: 'THREE library loaded successfully' };
            }
        );

        runner.addTest(
            'Scene creation and background color',
            'rendering',
            true,
            async () => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                
                if (!scene) {
                    return { pass: false, message: 'Scene not created' };
                }
                if (!scene.background) {
                    return { pass: false, message: 'Background not set' };
                }
                
                return { pass: true, message: 'Scene created with background' };
            }
        );

        runner.addTest(
            'Camera initialization and positioning',
            'rendering',
            true,
            async () => {
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 5, 10);
                camera.lookAt(0, 0, 0);
                
                if (!camera) {
                    return { pass: false, message: 'Camera not created' };
                }
                if (camera.position.x !== 0 || camera.position.y !== 5 || camera.position.z !== 10) {
                    return { pass: false, message: 'Camera position incorrect' };
                }
                
                return { pass: true, message: `Camera at (${camera.position.x}, ${camera.position.y}, ${camera.position.z})` };
            }
        );

        runner.addTest(
            'Renderer initialization and canvas attachment',
            'rendering',
            true,
            async () => {
                const canvas = runner.canvas;
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(800, 600);
                
                if (!renderer) {
                    return { pass: false, message: 'Renderer not created' };
                }
                if (renderer.domElement !== canvas) {
                    return { pass: false, message: 'Renderer not attached to canvas' };
                }
                
                renderer.dispose();
                return { pass: true, message: 'Renderer initialized correctly' };
            }
        );

        runner.addTest(
            'Basic rendering produces non-black frame',
            'rendering',
            true,
            async () => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                
                const camera = new THREE.PerspectiveCamera(60, 800 / 600, 0.1, 1000);
                camera.position.set(0, 5, 10);
                camera.lookAt(0, 0, 0);
                
                const canvas = runner.canvas;
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(800, 600);
                
                // Add a visible object
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                
                // Add light
                const light = new THREE.AmbientLight(0xffffff, 1.0);
                scene.add(light);
                
                // Render
                renderer.render(scene, camera);
                
                // Check if canvas has non-black pixels
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                let hasNonBlack = false;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] > 10 || data[i+1] > 10 || data[i+2] > 10) {
                        hasNonBlack = true;
                        break;
                    }
                }
                
                renderer.dispose();
                
                if (!hasNonBlack) {
                    return { pass: false, message: 'Rendered frame is all black' };
                }
                
                return { pass: true, message: 'Render produces visible content' };
            }
        );

        runner.addTest(
            'Player mesh creation',
            'rendering',
            true,
            async () => {
                const scene = new THREE.Scene();
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshPhongMaterial({ color: 0x00ffff });
                const player = new THREE.Mesh(geometry, material);
                player.position.set(0, 2, 0);
                scene.add(player);
                
                if (!player) {
                    return { pass: false, message: 'Player not created' };
                }
                if (!scene.children.includes(player)) {
                    return { pass: false, message: 'Player not added to scene' };
                }
                
                return { pass: true, message: 'Player mesh created and added to scene' };
            }
        );

        runner.addTest(
            'Platform creation and scene addition',
            'rendering',
            true,
            async () => {
                const scene = new THREE.Scene();
                const geometry = new THREE.BoxGeometry(10, 1, 10);
                const material = new THREE.MeshPhongMaterial({ color: 0x228b22 });
                const platform = new THREE.Mesh(geometry, material);
                platform.position.set(0, 0, 0);
                scene.add(platform);
                
                if (!platform) {
                    return { pass: false, message: 'Platform not created' };
                }
                if (!scene.children.includes(platform)) {
                    return { pass: false, message: 'Platform not added to scene' };
                }
                
                return { pass: true, message: 'Platform created successfully' };
            }
        );

        runner.addTest(
            'Lighting setup',
            'rendering',
            true,
            async () => {
                const scene = new THREE.Scene();
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(10, 20, 10);
                scene.add(dirLight);
                
                const lights = scene.children.filter(obj => obj.isLight);
                
                if (lights.length < 2) {
                    return { pass: false, message: `Only ${lights.length} lights in scene` };
                }
                
                return { pass: true, message: `${lights.length} lights configured` };
            }
        );

        // ===== GAMEPLAY TESTS =====
        runner.addTest(
            'Movement speed is adequate (15 units/sec)',
            'gameplay',
            true,
            async () => {
                const moveSpeed = 15;
                const deltaTime = 0.016; // 60 FPS
                const distance = moveSpeed * deltaTime;
                
                if (distance < 0.2) {
                    return { pass: false, message: `Movement too slow: ${distance} units per frame` };
                }
                
                return { pass: true, message: `Movement speed: ${moveSpeed} units/sec` };
            }
        );

        runner.addTest(
            'Jump height can clear gaps (18 force)',
            'gameplay',
            true,
            async () => {
                const jumpForce = 18;
                const gravity = 20;
                const maxHeight = (jumpForce * jumpForce) / (2 * gravity);
                
                if (maxHeight < 8) {
                    return { pass: false, message: `Jump height too low: ${maxHeight.toFixed(2)} units` };
                }
                
                return { pass: true, message: `Max jump height: ${maxHeight.toFixed(2)} units` };
            }
        );

        runner.addTest(
            'Death check triggers at Y < -20',
            'gameplay',
            true,
            async () => {
                const deathThreshold = -20;
                const playerY = -25;
                
                if (playerY < deathThreshold) {
                    return { pass: true, message: 'Death check would trigger correctly' };
                } else {
                    return { pass: false, message: 'Death check logic incorrect' };
                }
            }
        );

        runner.addTest(
            'Level has minimum required platforms',
            'gameplay',
            false,
            async () => {
                // Simulate level generation
                const platforms = [];
                
                // Ground
                platforms.push({ x: 0, y: -1, z: 0 });
                // Tutorial platforms
                platforms.push({ x: 10, y: 0, z: 0 });
                platforms.push({ x: 20, y: 0, z: 0 });
                
                if (platforms.length < 2) {
                    return { pass: false, message: `Only ${platforms.length} platforms` };
                }
                
                return { pass: true, message: `${platforms.length} platforms generated` };
            }
        );

        // ===== PHYSICS TESTS =====
        runner.addTest(
            'Gravity applies consistently',
            'physics',
            true,
            async () => {
                const gravity = 20;
                const velocity = { y: 10 };
                const deltaTime = 0.016;
                
                velocity.y -= gravity * deltaTime;
                
                if (velocity.y >= 10) {
                    return { pass: false, message: 'Gravity not applying' };
                }
                
                return { pass: true, message: `Velocity changed to ${velocity.y.toFixed(2)}` };
            }
        );

        runner.addTest(
            'Collision detection between player and platform',
            'physics',
            false,
            async () => {
                const player = { x: 5, y: 1, z: 0, width: 1, height: 2, depth: 1 };
                const platform = { x: 5, y: 0, z: 0, width: 10, height: 1, depth: 10 };
                
                const collides = (
                    Math.abs(player.x - platform.x) < (player.width + platform.width) / 2 &&
                    Math.abs(player.y - platform.y) < (player.height + platform.height) / 2 &&
                    Math.abs(player.z - platform.z) < (player.depth + platform.depth) / 2
                );
                
                if (!collides) {
                    return { pass: false, message: 'Collision not detected' };
                }
                
                return { pass: true, message: 'Collision detected correctly' };
            }
        );

        runner.addTest(
            'Player respawns at correct position',
            'physics',
            true,
            async () => {
                const player = { x: 100, y: -30, z: 50 };
                
                // Respawn logic
                if (player.y < -20) {
                    player.x = 0;
                    player.y = 2;
                    player.z = 0;
                }
                
                if (player.y !== 2) {
                    return { pass: false, message: 'Respawn position incorrect' };
                }
                
                return { pass: true, message: `Player respawned at (${player.x}, ${player.y}, ${player.z})` };
            }
        );

        // ===== PHASE TRANSITION TESTS =====
        runner.addTest(
            'Phase 1 uses Three.js renderer',
            'phase',
            true,
            async () => {
                const phase = 1;
                const useThreeJS = (phase === 1);
                
                if (!useThreeJS) {
                    return { pass: false, message: 'Phase 1 not using Three.js' };
                }
                
                return { pass: true, message: 'Phase 1 correctly uses Three.js' };
            }
        );

        runner.addTest(
            'Phase 2 transitions to 2D Canvas (Anime)',
            'phase',
            false,
            async () => {
                const phase = 2;
                const use2D = (phase === 2 || phase === 3);
                
                if (!use2D) {
                    return { pass: false, message: 'Phase 2 not using 2D canvas' };
                }
                
                return { pass: true, message: 'Phase 2 uses 2D canvas rendering' };
            }
        );

        runner.addTest(
            'Level ranges map to correct phases',
            'phase',
            true,
            async () => {
                const getPhase = (level) => {
                    if (level <= 5) return 1;
                    if (level <= 10) return 2;
                    return 3;
                };
                
                if (getPhase(1) !== 1) return { pass: false, message: 'Level 1 wrong phase' };
                if (getPhase(5) !== 1) return { pass: false, message: 'Level 5 wrong phase' };
                if (getPhase(6) !== 2) return { pass: false, message: 'Level 6 wrong phase' };
                if (getPhase(10) !== 2) return { pass: false, message: 'Level 10 wrong phase' };
                if (getPhase(11) !== 3) return { pass: false, message: 'Level 11 wrong phase' };
                if (getPhase(15) !== 3) return { pass: false, message: 'Level 15 wrong phase' };
                
                return { pass: true, message: 'All levels map to correct phases' };
            }
        );

        // ===== INTEGRATION TESTS =====
        runner.addTest(
            'Full game initialization sequence',
            'integration',
            true,
            async () => {
                try {
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x87ceeb);
                    
                    const camera = new THREE.PerspectiveCamera(60, 800/600, 0.1, 1000);
                    camera.position.set(0, 5, 10);
                    camera.lookAt(0, 0, 0);
                    
                    const canvas = runner.canvas;
                    const renderer = new THREE.WebGLRenderer({ canvas });
                    renderer.setSize(800, 600);
                    
                    const player = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 2, 1),
                        new THREE.MeshPhongMaterial({ color: 0x00ffff })
                    );
                    player.position.set(0, 2, 0);
                    scene.add(player);
                    
                    const light = new THREE.AmbientLight(0xffffff, 1.0);
                    scene.add(light);
                    
                    renderer.render(scene, camera);
                    renderer.dispose();
                    
                    return { pass: true, message: 'Full initialization completed' };
                } catch (error) {
                    return { pass: false, message: error.message };
                }
            }
        );

        runner.addTest(
            'Canvas exists in DOM',
            'integration',
            true,
            async () => {
                // Check if game canvas would exist
                const testCanvas = document.createElement('canvas');
                testCanvas.width = 800;
                testCanvas.height = 600;
                
                if (!testCanvas) {
                    return { pass: false, message: 'Cannot create canvas element' };
                }
                
                return { pass: true, message: 'Canvas can be created' };
            }
        );

        runner.addTest(
            'Game loop timing is correct',
            'integration',
            false,
            async () => {
                let lastTime = performance.now();
                await runner.delay(16); // ~60 FPS
                let now = performance.now();
                let deltaTime = (now - lastTime) / 1000;
                
                if (deltaTime < 0.015 || deltaTime > 0.02) {
                    return { pass: false, message: `Delta time: ${deltaTime.toFixed(4)}s (expected ~0.016s)` };
                }
                
                return { pass: true, message: `Delta time: ${deltaTime.toFixed(4)}s` };
            }
        );

        // Resource Flow Icon Tests
        // Note: test helpers mirror production constants (UPGRADE_POWER, BUILDINGS, FLOW_*)
        // but are self-contained so the test suite can run without loading the full game.
        const FLOW_TEST_UPGRADE_POWER = { 1: 1.0, 2: 2.0, 3: 4.5 };
        const FLOW_TEST_BUILDINGS = {
            collector:   { acPerSec: 2 },
            processor:   { okrPerSec: 5 },
            generator:   { elPerSec: 5 },
            bank:        { interestRate: 0.02 },
            synthesizer: { okrPerSec: 100 },
            multiplier:  {},
        };
        const FLOW_TEST_COLORS = { okr: '#00e676', ac: '#ffd700', el: '#ff44ff' };
        const FLOW_TEST_SPEED = 100;
        const FLOW_TEST_MAX = 80;

        function makeFlowTestGame(nodes) {
            return {
                nodes: nodes || [
                    { type: 'collector',  x: 100, y: 200, level: 1, hp: 100, maxHp: 100 },
                    { type: 'processor',  x: 300, y: 150, level: 1, hp: 100, maxHp: 100 },
                    { type: 'generator',  x: 500, y: 300, level: 2, hp: 100, maxHp: 100 },
                ],
                resourceFlowIcons: [],
                flowSpawnTimers: {},
                computeConnectionEdges() {
                    const fX = 960, fY = 540;
                    const pts = [{ x: fX, y: fY, idx: -1 }];
                    this.nodes.forEach((n, i) => pts.push({ x: n.x, y: n.y, idx: i }));
                    if (pts.length < 2) return [];
                    const inTree = pts.map(() => false);
                    const minDist = pts.map(() => Infinity);
                    const minEdge = pts.map(() => -1);
                    inTree[0] = true;
                    for (let j = 1; j < pts.length; j++) {
                        const dx = pts[j].x - pts[0].x, dy = pts[j].y - pts[0].y;
                        minDist[j] = Math.sqrt(dx*dx + dy*dy);
                        minEdge[j] = 0;
                    }
                    const edges = [];
                    for (let step = 1; step < pts.length; step++) {
                        let best = -1, bestDist = Infinity;
                        for (let j = 1; j < pts.length; j++) {
                            if (!inTree[j] && minDist[j] < bestDist) { bestDist = minDist[j]; best = j; }
                        }
                        if (best === -1) break;
                        inTree[best] = true;
                        edges.push({ from: pts[best], to: pts[minEdge[best]] });
                        for (let j = 1; j < pts.length; j++) {
                            if (!inTree[j]) {
                                const dx = pts[j].x - pts[best].x, dy = pts[j].y - pts[best].y;
                                const d = Math.sqrt(dx*dx + dy*dy);
                                if (d < minDist[j]) { minDist[j] = d; minEdge[j] = best; }
                            }
                        }
                    }
                    return edges;
                },
                updateResourceFlowIcons(dt) {
                    for (let i = this.resourceFlowIcons.length - 1; i >= 0; i--) {
                        const icon = this.resourceFlowIcons[i];
                        icon.elapsed += dt;
                        icon.t = icon.elapsed / icon.duration;
                        if (icon.t >= 1) this.resourceFlowIcons.splice(i, 1);
                    }
                    if (this.resourceFlowIcons.length >= FLOW_TEST_MAX) return;
                    const edges = this.computeConnectionEdges();
                    const edgeByIdx = {};
                    edges.forEach(e => { if (e.from.idx >= 0) edgeByIdx[e.from.idx] = e; });
                    for (let i = 0; i < this.nodes.length; i++) {
                        if (this.resourceFlowIcons.length >= FLOW_TEST_MAX) break;
                        const node = this.nodes[i];
                        const btype = FLOW_TEST_BUILDINGS[node.type];
                        if (!btype) continue;
                        const edge = edgeByIdx[i];
                        if (!edge) continue;
                        const hpRatio = (node.hp !== undefined ? node.hp : 100) / (node.maxHp || 100);
                        if (hpRatio <= 0) continue;
                        let resType = null, spawnRate = 0;
                        const lvlMult = FLOW_TEST_UPGRADE_POWER[node.level || 1] || 1;
                        if (btype.okrPerSec > 0) {
                            resType = 'okr'; spawnRate = Math.max(0.2, Math.min(3, btype.okrPerSec * lvlMult / 5));
                        } else if (btype.acPerSec > 0) {
                            resType = 'ac'; spawnRate = Math.max(0.2, Math.min(3, btype.acPerSec * lvlMult / 2));
                        } else if (btype.elPerSec > 0) {
                            resType = 'el'; spawnRate = Math.max(0.2, Math.min(3, btype.elPerSec * lvlMult / 5));
                        } else if (btype.interestRate > 0) {
                            resType = 'ac'; spawnRate = 0.4;
                        }
                        if (!resType) continue;
                        if (this.flowSpawnTimers[i] === undefined) {
                            this.flowSpawnTimers[i] = Math.random() * (1 / spawnRate);
                        }
                        this.flowSpawnTimers[i] -= dt;
                        if (this.flowSpawnTimers[i] > 0) continue;
                        this.flowSpawnTimers[i] = 1 / spawnRate;
                        const dx = edge.to.x - edge.from.x, dy = edge.to.y - edge.from.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 1) continue;
                        this.resourceFlowIcons.push({
                            x1: edge.from.x, y1: edge.from.y, x2: edge.to.x, y2: edge.to.y,
                            t: 0, elapsed: 0, duration: dist / FLOW_TEST_SPEED,
                            resourceType: resType, color: FLOW_TEST_COLORS[resType],
                            sinePhase: Math.random() * Math.PI * 2, sineAmp: 4 + Math.random() * 3
                        });
                    }
                }
            };
        }

        runner.addTest(
            'Resource flow icons spawn for producing buildings',
            'integration',
            true,
            async () => {
                const game = makeFlowTestGame();
                // Simulate 10 seconds at 60fps
                for (let f = 0; f < 600; f++) game.updateResourceFlowIcons(1/60);
                if (game.resourceFlowIcons.length === 0) {
                    return { pass: false, message: 'No flow icons were spawned after 10s' };
                }
                const types = new Set(game.resourceFlowIcons.map(i => i.resourceType));
                if (!types.has('okr') || !types.has('ac') || !types.has('el')) {
                    return { pass: false, message: `Missing resource types, found: ${[...types].join(',')}` };
                }
                return { pass: true, message: `${game.resourceFlowIcons.length} icons spawned (OKR, AC, EL all present)` };
            }
        );

        runner.addTest(
            'Resource flow icons have valid progress and colors',
            'integration',
            true,
            async () => {
                const game = makeFlowTestGame();
                for (let f = 0; f < 300; f++) game.updateResourceFlowIcons(1/60);
                const allValidT = game.resourceFlowIcons.every(i => i.t >= 0 && i.t <= 1);
                const allHaveColor = game.resourceFlowIcons.every(i => i.color && i.color.startsWith('#'));
                if (!allValidT) return { pass: false, message: 'Some icons have t outside [0,1]' };
                if (!allHaveColor) return { pass: false, message: 'Some icons are missing color' };
                return { pass: true, message: `${game.resourceFlowIcons.length} icons all have valid t and color` };
            }
        );

        runner.addTest(
            'Resource flow icon pool is capped at maximum',
            'integration',
            false,
            async () => {
                const manyNodes = [];
                for (let n = 0; n < 50; n++) {
                    manyNodes.push({ type: 'processor', x: n*30+50, y: n*15+100, level: 3, hp: 100, maxHp: 100 });
                }
                const game = makeFlowTestGame(manyNodes);
                for (let f = 0; f < 600; f++) game.updateResourceFlowIcons(1/60);
                if (game.resourceFlowIcons.length > FLOW_TEST_MAX) {
                    return { pass: false, message: `Icons exceeded pool limit: ${game.resourceFlowIcons.length} > ${FLOW_TEST_MAX}` };
                }
                return { pass: true, message: `Icons capped at ${game.resourceFlowIcons.length} (limit: ${FLOW_TEST_MAX})` };
            }
        );

        runner.addTest(
            'Destroyed buildings do not spawn flow icons',
            'integration',
            true,
            async () => {
                const game = makeFlowTestGame([
                    { type: 'collector', x: 100, y: 200, level: 1, hp: 0, maxHp: 100 },   // destroyed
                    { type: 'processor', x: 300, y: 150, level: 1, hp: 100, maxHp: 100 }, // healthy
                ]);
                for (let f = 0; f < 600; f++) game.updateResourceFlowIcons(1/60);
                const acIcons = game.resourceFlowIcons.filter(i => i.resourceType === 'ac');
                // The destroyed collector should NOT spawn AC icons
                // (processor spawns OKR only, so no AC icons expected from it)
                if (acIcons.length > 0) {
                    return { pass: false, message: `Destroyed collector spawned ${acIcons.length} AC icons` };
                }
                const okrIcons = game.resourceFlowIcons.filter(i => i.resourceType === 'okr');
                if (okrIcons.length === 0) {
                    return { pass: false, message: 'Healthy processor did not spawn OKR icons' };
                }
                return { pass: true, message: `Destroyed building produced no icons; healthy processor has ${okrIcons.length} OKR icons` };
            }
        );

        // Make runner global for button clicks
        window.runner = runner;
        window.runAllTests = () => runner.runAllTests();
        window.runCriticalTests = () => runner.runCriticalTests();
        
        // Auto-run critical tests on load
        setTimeout(() => {
            console.log('Auto-running critical tests...');
            runner.runCriticalTests();
        }, 500);
    </script>
