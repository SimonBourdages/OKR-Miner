<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
            <feFlood flood-color="#e91e63" flood-opacity="1" result="flood"/>
            <feComposite in="flood" in2="blur" operator="in" result="glowLayer"/>
            <feMerge>
                <feMergeNode in="glowLayer"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="cyan-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
            <feFlood flood-color="#00bcd4" flood-opacity="1" result="flood"/>
            <feComposite in="flood" in2="blur" operator="in" result="glowLayer"/>
            <feMerge>
                <feMergeNode in="glowLayer"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Dark background -->
    <rect x="0" y="0" width="200" height="200" fill="#0a0a14"/>

    <!-- Subtle blueprint grid background -->
    <g stroke="#1e1e28" stroke-width="0.2" fill="none">
        <!-- Horizontal lines -->
        <line x1="0" y1="20" x2="200" y2="20"/>
        <line x1="0" y1="40" x2="200" y2="40"/>
        <line x1="0" y1="60" x2="200" y2="60"/>
        <line x1="0" y1="80" x2="200" y2="80"/>
        <line x1="0" y1="100" x2="200" y2="100"/>
        <line x1="0" y1="120" x2="200" y2="120"/>
        <line x1="0" y1="140" x2="200" y2="140"/>
        <line x1="0" y1="160" x2="200" y2="160"/>
        <line x1="0" y1="180" x2="200" y2="180"/>
        <!-- Vertical lines -->
        <line x1="20" y1="0" x2="20" y2="200"/>
        <line x1="40" y1="0" x2="40" y2="200"/>
        <line x1="60" y1="0" x2="60" y2="200"/>
        <line x1="80" y1="0" x2="80" y2="200"/>
        <line x1="100" y1="0" x2="100" y2="200"/>
        <line x1="120" y1="0" x2="120" y2="200"/>
        <line x1="140" y1="0" x2="140" y2="200"/>
        <line x1="160" y1="0" x2="160" y2="200"/>
        <line x1="180" y1="0" x2="180" y2="200"/>
        <!-- Center marker -->
        <circle cx="100" cy="100" r="3" stroke-width="0.5"/>
        <line x1="95" y1="100" x2="105" y2="100" stroke-width="0.5"/>
        <line x1="100" y1="95" x2="100" y2="105" stroke-width="0.5"/>
    </g>

    <!-- Ada's character elements -->
    <g transform="translate(0, 5)">
        <!-- Main head shape - stylized angular outline -->
        <path d="M100 20 L120 30 L130 50 L125 80 L100 90 L75 80 L70 50 L80 30 Z"
              fill="none" stroke="#e91e63" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

        <!-- Neck connector -->
        <rect x="90" y="88" width="20" height="15" fill="none" stroke="#e91e63" stroke-width="1.5"/>

        <!-- Shoulders / suit outline -->
        <path d="M60 100 L40 130 H160 L140 100 Z" fill="none" stroke="#e91e63" stroke-width="1.5" stroke-linejoin="round"/>

        <!-- Chest detail / central energy core on suit -->
        <rect x="90" y="110" width="20" height="15" fill="none" stroke="#e91e63" stroke-width="1.5" />
        <polygon points="100 110, 105 105, 110 110, 105 115, 100 110" fill="#e91e63" filter="url(#neon-glow)"/>

        <!-- Glowing facial features -->
        <rect x="83" y="48" width="8" height="3" fill="#e91e63" filter="url(#neon-glow)"/> <!-- Left eye -->
        <rect x="109" y="48" width="8" height="3" fill="#e91e63" filter="url(#neon-glow)"/> <!-- Right eye -->
        <rect x="95" y="65" width="10" height="2" fill="#e91e63" filter="url(#neon-glow)"/> <!-- Mouth/data port -->

        <!-- Forehead processor / central data point -->
        <circle cx="100" cy="35" r="4" fill="#e91e63" filter="url(#neon-glow)"/>
        <line x1="95" y1="35" x2="85" y2="35" stroke="#e91e63" stroke-width="0.5" filter="url(#neon-glow)"/>
        <line x1="105" y1="35" x2="115" y2="35" stroke="#e91e63" stroke-width="0.5" filter="url(#neon-glow)"/>

        <!-- Internal circuit patterns on head - neon pink -->
        <g stroke="#e91e63" stroke-width="0.7" fill="none" filter="url(#neon-glow)">
            <path d="M100 20 L90 40 L85 30 L75 45 M100 20 L110 40 L115 30 L125 45" />
            <line x1="100" y1="20" x2="100" y2="90" /> <!-- Central axis -->
            <line x1="80" y1="60" x2="120" y2="60" />
            <rect x="80" y="55" width="5" height="5"/>
            <rect x="115" y="55" width="5" height="5"/>
        </g>

        <!-- Circuit patterns on shoulders/suit - contrasting cyan glow -->
        <g stroke="#00bcd4" stroke-width="0.7" fill="none" filter="url(#cyan-glow)">
            <path d="M60 100 L50 110 Q40 115 50 120 L60 130"/>
            <path d="M140 100 L150 110 Q160 115 150 120 L140 130"/>
            <rect x="70" y="105" width="5" height="5"/>
            <rect x="125" y="105" width="5" height="5"/>
            <line x1="75" y1="107.5" x2="85" y2="107.5"/>
            <line x1="115" y1="107.5" x2="125" y2="107.5"/>
            <path d="M85 110 L90 115 L85 120 L80 115 Z"/>
            <path d="M115 110 L110 115 L115 120 L120 115 Z"/>
        </g>

        <!-- Digital aura elements - abstract lines radiating from head - neon pink -->
        <g stroke="#e91e63" stroke-width="0.8" fill="none" filter="url(#neon-glow)">
            <line x1="50" y1="70" x2="35" y2="60"/>
            <line x1="150" y1="70" x2="165" y2="60"/>
            <path d="M40 85 Q30 95 40 105"/>
            <path d="M160 85 Q170 95 160 105"/>
            <circle cx="25" cy="75" r="1.5"/>
            <circle cx="175" cy="75" r="1.5"/>
            <rect x="30" y="100" width="3" height="3" transform="rotate(45 31.5 101.5)"/>
            <rect x="167" y="100" width="3" height="3" transform="rotate(45 168.5 101.5)"/>
            <line x1="100" y1="10" x2="100" y2="5" />
            <path d="M95 15 L90 5 M105 15 L110 5" />
        </g>
    </g>
</svg>