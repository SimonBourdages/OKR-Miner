<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Neon Glow Filter for details -->
    <filter id="neonGlowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="glow"/>
      <feFlood flood-color="#ffd700" flood-opacity="1" result="coloredGlow"/>
      <feComposite in="coloredGlow" in2="glow" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger Gold Halo Glow Filter -->
    <filter id="haloGlowGold" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="glow"/>
      <feFlood flood-color="#ffd700" flood-opacity="1" result="coloredGlow"/>
      <feComposite in="coloredGlow" in2="glow" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green Neon Glow Filter for accents -->
    <filter id="neonGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="glow"/>
      <feFlood flood-color="#00ff88" flood-opacity="1" result="coloredGlow"/>
      <feComposite in="coloredGlow" in2="glow" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Linear Gradient for Jrod's body to give depth and hologram effect -->
    <linearGradient id="jrodBodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Hologram Scanlines Mask -->
    <mask id="hologramScanlines">
      <rect x="0" y="0" width="200" height="200" fill="white"/> <!-- Base for the mask, fully opaque -->
      <!-- Black bars for partial transparency (scanlines) -->
      <g fill="black" opacity="0.2"> <!-- Adjust opacity for intensity of scanlines -->
        <rect x="0" y="0" width="200" height="1"/>
        <rect x="0" y="4" width="200" height="1"/>
        <rect x="0" y="8" width="200" height="1"/>
        <rect x="0" y="12" width="200" height="1"/>
        <rect x="0" y="16" width="200" height="1"/>
        <rect x="0" y="20" width="200" height="1"/>
        <rect x="0" y="24" width="200" height="1"/>
        <rect x="0" y="28" width="200" height="1"/>
        <rect x="0" y="32" width="200" height="1"/>
        <rect x="0" y="36" width="200" height="1"/>
        <rect x="0" y="40" width="200" height="1"/>
        <rect x="0" y="44" width="200" height="1"/>
        <rect x="0" y="48" width="200" height="1"/>
        <rect x="0" y="52" width="200" height="1"/>
        <rect x="0" y="56" width="200" height="1"/>
        <rect x="0" y="60" width="200" height="1"/>
        <rect x="0" y="64" width="200" height="1"/>
        <rect x="0" y="68" width="200" height="1"/>
        <rect x="0" y="72" width="200" height="1"/>
        <rect x="0" y="76" width="200" height="1"/>
        <rect x="0" y="80" width="200" height="1"/>
        <rect x="0" y="84" width="200" height="1"/>
        <rect x="0" y="88" width="200" height="1"/>
        <rect x="0" y="92" width="200" height="1"/>
        <rect x="0" y="96" width="200" height="1"/>
        <rect x="0" y="100" width="200" height="1"/>
        <rect x="0" y="104" width="200" height="1"/>
        <rect x="0" y="108" width="200" height="1"/>
        <rect x="0" y="112" width="200" height="1"/>
        <rect x="0" y="116" width="200" height="1"/>
        <rect x="0" y="120" width="200" height="1"/>
        <rect x="0" y="124" width="200" height="1"/>
        <rect x="0" y="128" width="200" height="1"/>
        <rect x="0" y="132" width="200" height="1"/>
        <rect x="0" y="136" width="200" height="1"/>
        <rect x="0" y="140" width="200" height="1"/>
        <rect x="0" y="144" width="200" height="1"/>
        <rect x="0" y="148" width="200" height="1"/>
        <rect x="0" y="152" width="200" height="1"/>
        <rect x="0" y="156" width="200" height="1"/>
        <rect x="0" y="160" width="200" height="1"/>
        <rect x="0" y="164" width="200" height="1"/>
        <rect x="0" y="168" width="200" height="1"/>
        <rect x="0" y="172" width="200" height="1"/>
        <rect x="0" y="176" width="200" height="1"/>
        <rect x="0" y="180" width="200" height="1"/>
        <rect x="0" y="184" width="200" height="1"/>
        <rect x="0" y="188" width="200" height="1"/>
        <rect x="0" y="192" width="200" height="1"/>
        <rect x="0" y="196" width="200" height="1"/>
      </g>
    </mask>
  </defs>

  <!-- Dark Background -->
  <rect width="200" height="200" fill="#0a0a14"/>

  <!-- Jrod Character Group -->
  <g id="jrod" mask="url(#hologramScanlines)">
    <!-- Main Body and Head (Gold Armor with Gradient and slight transparency) -->
    <path d="M 50 180 L 150 180 L 160 140 L 125 90 L 130 50 L 70 50 L 75 90 L 40 140 Z"
          fill="url(#jrodBodyGradient)"
          stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.9"/>
    
    <!-- Visor (Glowing Gold) -->
    <path d="M 80 70 L 120 70 L 125 75 L 75 75 Z"
          fill="#ffd700" filter="url(#neonGlowGold)"/>

    <!-- Chest Accent (Glowing Green) -->
    <path d="M 90 130 L 110 130 L 100 110 Z"
          fill="#00ff88" fill-opacity="0.6" filter="url(#neonGlowGreen)"/>

    <!-- Halo of Light - Outer Arc (Strong Gold Glow) -->
    <path d="M 70 35 Q 100 0 130 35"
          fill="none" stroke="#ffd700" stroke-width="2" filter="url(#haloGlowGold)"/>
    
    <!-- Halo of Light - Inner Arc (Subtler Gold Glow) -->
    <path d="M 75 40 Q 100 10 125 40"
          fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#neonGlowGold)"/>
  </g>
</svg>