<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Outer glow: cyan, broader blur -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur-outer"/>
      <feFlood flood-color="#00bcd4" flood-opacity="1" result="color-outer"/>
      <feComposite in="color-outer" in2="blur-outer" operator="in" result="glow-outer"/>

      <!-- Inner glow: brighter, tighter blur (like a core) -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur-inner"/>
      <feFlood flood-color="white" flood-opacity="0.8" result="color-inner"/>
      <feComposite in="color-inner" in2="blur-inner" operator="in" result="glow-inner"/>

      <!-- Merge the glow layers with the original graphic -->
      <feMerge>
        <feMergeNode in="glow-outer"/>
        <feMergeNode in="glow-inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect x="0" y="0" width="200" height="200" fill="#0a0a14"/>

  <!-- Character: Josh (Tech Lead) - Built with chunky 4x4 pixel blocks -->
  <!-- The entire character group is translated to center it within the 200x200 viewBox -->
  <g transform="translate(10, 20)">

    <!-- Helmet/Head Base (Dark Tones) -->
    <rect x="40" y="0" width="40" height="4" fill="#1a1a2a"/>
    <rect x="32" y="4" width="56" height="4" fill="#1a1a2a"/>
    <rect x="24" y="8" width="72" height="4" fill="#1a1a2a"/>
    <rect x="16" y="12" width="88" height="4" fill="#1a1a2a"/>
    <rect x="8" y="16" width="104" height="4" fill="#1a1a2a"/>
    <rect x="0" y="20" width="120" height="4" fill="#1a1a2a"/>
    <rect x="0" y="24" width="120" height="4" fill="#1a1a2a"/>
    <rect x="0" y="28" width="120" height="4" fill="#1a1a2a"/>
    <rect x="0" y="32" width="120" height="4" fill="#1a1a2a"/>
    <rect x="8" y="36" width="104" height="4" fill="#1a1a2a"/>
    <rect x="16" y="40" width="88" height="4" fill="#1a1a2a"/>
    <rect x="24" y="44" width="72" height="4" fill="#1a1a2a"/>

    <!-- Neck / Collar Base -->
    <rect x="40" y="48" width="40" height="4" fill="#1a1a2a"/>
    <rect x="32" y="52" width="56" height="4" fill="#1a1a2a"/>

    <!-- Shoulders / Upper Torso Base -->
    <rect x="24" y="56" width="72" height="4" fill="#1a1a2a"/>
    <rect x="16" y="60" width="88" height="4" fill="#1a1a2a"/>
    <rect x="8" y="64" width="104" height="4" fill="#1a1a2a"/>
    <rect x="0" y="68" width="120" height="4" fill="#1a1a2a"/>
    <rect x="0" y="72" width="120" height="4" fill="#1a1a2a"/>
    <rect x="0" y="76" width="120" height="4" fill="#1a1a2a"/>
    <rect x="8" y="80" width="104" height="4" fill="#1a1a2a"/>
    <rect x="16" y="84" width="88" height="4" fill="#1a1a2a"/>

    <!-- High-Tech Visor - Main shape (darker cyan) -->
    <rect x="28" y="20" width="64" height="4" fill="#00A0B8"/>
    <rect x="24" y="24" width="72" height="8" fill="#00A0B8"/>
    <rect x="28" y="32" width="64" height="4" fill="#00A0B8"/>

    <!-- Visor - Inner glow elements (signature #00bcd4 cyan) -->
    <rect x="32" y="24" width="56" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="28" y="28" width="64" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="32" y="32" width="56" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <!-- Additional small glowing accents on the visor sides -->
    <rect x="24" y="20" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="92" y="20" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="20" y="24" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="96" y="24" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>

    <!-- Uniform details - Cybernetic Lines / Accents (signature #00bcd4 cyan) -->
    <!-- Collar accent -->
    <rect x="40" y="52" width="40" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="32" y="56" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="84" y="56" width="4" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>

    <!-- Chest accent -->
    <rect x="48" y="68" width="24" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="44" y="72" width="32" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>
    <rect x="40" y="76" width="40" height="4" fill="#00bcd4" filter="url(#neon-glow)"/>

  </g>
</svg>