<rect x="55" y="110" width="21" height="10" rx="4" fill="rgb(15,69,38)" stroke="#27ae60" stroke-width="2"/>
<rect x="124" y="110" width="21" height="10" rx="4" fill="rgb(15,69,38)" stroke="#27ae60" stroke-width="2"/>
<text x="100" y="188" text-anchor="middle" fill="#27ae60" font-size="13" font-family="sans-serif" font-weight="bold" filter="url(#glow)">Mason</text>
