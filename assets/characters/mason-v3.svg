</circle>
<path d="M86 80 Q100 92 114 80" fill="none" stroke="#27ae60" stroke-width="2"/>
<rect x="76" y="102" width="48" height="60" rx="8" fill="rgb(15,69,38)" stroke="#27ae60" stroke-width="3" filter="url(#glow)"/>
