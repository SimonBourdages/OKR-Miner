<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/><feFlood flood-color="#27ae60" flood-opacity="0.6" result="color"/><feComposite in="color" in2="blur" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<radialGradient id="cr" cx="50%" cy="45%">
  <stop offset="0%" stop-color="#27ae60" stop-opacity="0.25"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient></defs>
<rect width="200" height="200" fill="#0a0a14"/>
<circle cx="100" cy="90" r="80" fill="url(#cr)"/>
<circle cx="100" cy="70" r="32" fill="rgb(15,69,38)" stroke="#27ae60" stroke-width="3" filter="url(#glow)"/>
<circle cx="88" cy="65" r="5" fill="#27ae60" filter="url(#glow)">
  <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
</circle>
<circle cx="112" cy="65" r="5" fill="#27ae60" filter="url(#glow)">
