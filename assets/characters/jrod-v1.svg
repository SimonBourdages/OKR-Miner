<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="jrodGoldNeonGlow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
      <!-- Outer soft glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="outerGlow"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.8" result="floodOuter"/>
      <feComposite in="floodOuter" in2="outerGlow" operator="in" result="combinedOuter"/>

      <!-- Inner brighter core -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="innerGlow"/>
      <feFlood flood-color="#ffe666" flood-opacity="1" result="floodInner"/>
      <feComposite in="floodInner" in2="innerGlow" operator="in" result="combinedInner"/>

      <!-- Merge all layers: outer glow, inner glow, and original source graphic on top -->
      <feMerge>
        <feMergeNode in="combinedOuter"/>
        <feMergeNode in="combinedInner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="200" height="200" fill="#0a0a14"/>

  <!-- Jrod Character Elements -->

  <!-- Halo/Crown of Light - using signature gold with neon glow -->
  <path d="M60 40 A40 20 0 1 1 140 40" fill="none" stroke="#ffd700" stroke-width="4" filter="url(#jrodGoldNeonGlow)"/>
  <!-- Subtle inner path for enhanced light effect -->
  <path d="M62 42 A38 18 0 1 1 138 42" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>

  <!-- Helmet - main dark mass -->
  <path d="M100 60 C120 60 130 70 130 85 L130 110 H70 L70 85 C70 70 80 60 100 60 Z" fill="#1a1a2e"/>
  <!-- Helmet - glowing outline -->
  <path d="M100 60 C120 60 130 70 130 85 L130 110 H70 L70 85 C70 70 80 60 100 60 Z" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#jrodGoldNeonGlow)"/>

  <!-- Visor - central glowing element -->
  <rect x="80" y="88" width="40" height="8" fill="#ffd700" filter="url(#jrodGoldNeonGlow)"/>

  <!-- Neck guard / Collar - main dark mass -->
  <path d="M100 110 L125 118 V127 L100 130 L75 127 V118 Z" fill="#1a1a2e"/>
  <!-- Neck guard / Collar - glowing outline -->
  <path d="M100 110 L125 118 V127 L100 130 L75 127 V118 Z" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#jrodGoldNeonGlow)"/>

  <!-- Chest plate - main dark mass -->
  <path d="M100 130 L150 140 V160 L100 170 L50 160 V140 Z" fill="#1a1a2e"/>
  <!-- Chest plate - glowing outline -->
  <path d="M100 130 L150 140 V160 L100 170 L50 160 V140 Z" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#jrodGoldNeonGlow)"/>

  <!-- Left Shoulder pad - main dark mass -->
  <path d="M70 110 L45 125 V145 L70 130 Z" fill="#1a1a2e"/>
  <!-- Left Shoulder pad - glowing outline -->
  <path d="M70 110 L45 125 V145 L70 130 Z" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#jrodGoldNeonGlow)"/>

  <!-- Right Shoulder pad - main dark mass -->
  <path d="M130 110 L155 125 V145 L130 130 Z" fill="#1a1a2e"/>
  <!-- Right Shoulder pad - glowing outline -->
  <path d="M130 110 L155 125 V145 L130 130 Z" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#jrodGoldNeonGlow)"/>

</svg>