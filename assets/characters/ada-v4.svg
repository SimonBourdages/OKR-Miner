<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Neon Glow Filter for signature pink/magenta -->
        <filter id="neonGlowPink" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blurLight" />
            <feFlood flood-color="#e91e63" flood-opacity="0.7" result="glowColorLight" />
            <feComposite in="glowColorLight" in2="blurLight" operator="in" result="glowLayerLight" />

            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blurStrong" />
            <feFlood flood-color="#e91e63" flood-opacity="0.4" result="glowColorStrong" />
            <feComposite in="glowColorStrong" in2="blurStrong" operator="in" result="glowLayerStrong" />

            <feMerge>
                <feMergeNode in="glowLayerStrong" />
                <feMergeNode in="glowLayerLight" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Gradient for fading out the hologram at the bottom of the bust -->
        <linearGradient id="hologramFade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e91e63" stop-opacity="0.8"/>
            <stop offset="70%" stop-color="#e91e63" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#e91e63" stop-opacity="0"/>
        </linearGradient>

        <!-- Gradient for subtle internal glow/depth on character's main forms -->
        <linearGradient id="hologramInner" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e91e63" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#e91e63" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#e91e63" stop-opacity="0.2"/>
        </linearGradient>

        <!-- Faint background grid pattern -->
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00bcd4" stroke-width="0.2" opacity="0.05"/>
        </pattern>
    </defs>

    <!-- Dark background -->
    <rect width="200" height="200" fill="#0a0a14"/>
    <!-- Background grid layer -->
    <rect width="200" height="200" fill="url(#grid)" />

    <!-- Digital Aura / Outer Glow -->
    <rect x="20" y="20" width="160" height="160" rx="20" ry="20" fill="none" stroke="#e91e63" stroke-width="2" opacity="0.08" filter="url(#neonGlowPink)"/>
    <path d="M 50 100 C 30 70, 30 40, 60 30 L 140 30 C 170 40, 170 70, 150 100" fill="none" stroke="#00bcd4" stroke-width="1" opacity="0.05" filter="url(#neonGlowPink)"/>

    <!-- Main Character Group - Ada -->
    <g transform="translate(0, 10)"> 
        <!-- Ada's Head base shape -->
        <path d="M 70 50 L 130 50 L 140 80 L 130 110 L 100 125 L 70 110 L 60 80 Z"
            fill="url(#hologramInner)" opacity="0.4" stroke="#e91e63" stroke-width="1" stroke-dasharray="5 2" filter="url(#neonGlowPink)"/>

        <!-- Digital Glitch/Noise Effect (offset copies for head) -->
        <path d="M 70 50 L 130 50 L 140 80 L 130 110 L 100 125 L 70 110 L 60 80 Z" fill="#00bcd4" opacity="0.05" transform="translate(2, -1)" />
        <path d="M 70 50 L 130 50 L 140 80 L 130 110 L 100 125 L 70 110 L 60 80 Z" fill="#00ff88" opacity="0.05" transform="translate(-1, 2)" />

        <!-- Eyes - glowing green -->
        <rect x="83" y="75" width="10" height="4" fill="#00ff88" opacity="0.9" filter="url(#neonGlowPink)"/>
        <rect x="107" y="75" width="10" height="4" fill="#00ff88" opacity="0.9" filter="url(#neonGlowPink)"/>
        <!-- Eye pupils/indicators for depth -->
        <circle cx="88" cy="77" r="1.5" fill="#0a0a14" opacity="0.6"/>
        <circle cx="112" cy="77" r="1.5" fill="#0a0a14" opacity="0.6"/>

        <!-- Headpiece/Data Port - pink with cyan accent -->
        <path d="M 80 47 L 120 47 L 115 42 L 85 42 Z" fill="#e91e63" opacity="0.8" filter="url(#neonGlowPink)"/>
        <line x1="90" y1="44" x2="110" y2="44" stroke="#00bcd4" stroke-width="1.5" opacity="0.7" filter="url(#neonGlowPink)"/>

        <!-- Neck segment -->
        <path d="M 95 125 L 105 125 L 110 135 L 90 135 Z"
            fill="url(#hologramInner)" opacity="0.5" stroke="#e91e63" stroke-width="1" stroke-dasharray="5 2" filter="url(#neonGlowPink)"/>

        <!-- Shoulders / Bust - fading out at the bottom -->
        <path d="M 45 140 L 155 140 L 165 180 L 35 180 Z"
            fill="url(#hologramFade)" opacity="0.6" stroke="#e91e63" stroke-width="1" stroke-dasharray="5 2" filter="url(#neonGlowPink)"/>

        <!-- Digital Glitch/Noise Effect (offset copies for body) -->
        <path d="M 45 140 L 155 140 L 165 180 L 35 180 Z" fill="#00bcd4" opacity="0.05" transform="translate(-2, 1)" />
        <path d="M 45 140 L 155 140 L 165 180 L 35 180 Z" fill="#00ff88" opacity="0.05" transform="translate(1, -2)" />

        <!-- Circuit patterns on chest - green and cyan accents -->
        <g stroke-width="0.5" stroke="#00ff88" opacity="0.7" filter="url(#neonGlowPink)">
            <line x1="70" y1="150" x2="130" y2="150" stroke-dasharray="2 2"/>
            <line x1="60" y1="160" x2="140" y2="160" stroke-dasharray="2 2"/>
            <line x1="70" y1="170" x2="130" y2="170" stroke-dasharray="2 2"/>
            <circle cx="70" cy="150" r="1.5" fill="#00ff88"/>
            <circle cx="130" cy="150" r="1.5" fill="#00ff88"/>
            <rect x="55" y="155" width="3" height="10" fill="#00bcd4"/>
            <rect x="142" y="155" width="3" height="10" fill="#00bcd4"/>
        </g>

        <!-- Floating Data Bits / Digital Aura around character -->
        <g fill="#00bcd4" opacity="0.4" filter="url(#neonGlowPink)">
            <rect x="30" y="80" width="3" height="3" transform="rotate(45 31.5 81.5)"/>
            <rect x="160" y="70" width="3" height="3" transform="rotate(30 161.5 71.5)"/>
            <rect x="40" y="130" width="2" height="2" transform="rotate(60 41 131)"/>
            <rect x="150" y="120" width="2" height="2" transform="rotate(75 151 121)"/>
            <line x1="25" y1="100" x2="35" y2="105" stroke="#00ff88" stroke-width="0.5" opacity="0.6" stroke-dasharray="1 2"/>
            <line x1="165" y1="95" x2="175" y2="100" stroke="#00ff88" stroke-width="0.5" opacity="0.6" stroke-dasharray="1 2"/>
        </g>

        <!-- Scan line overlay on top of character's main form -->
        <g opacity="0.2" stroke="#e91e63" stroke-width="0.7">
            <line x1="40" y1="60" x2="160" y2="60" stroke-dasharray="10 20"/>
            <line x1="40" y1="90" x2="160" y2="90" stroke-dasharray="20 10"/>
            <line x1="40" y1="120" x2="160" y2="120" stroke-dasharray="10 20"/>
            <line x1="40" y1="150" x2="160" y2="150" stroke-dasharray="20 10"/>
        </g>
    </g>
</svg>