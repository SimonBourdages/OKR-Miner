<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon Glow Filter for Ada's signature pink/magenta elements -->
    <filter id="neonGlowPink" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Inner glow (brighter pink/magenta) -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blurInner"/>
      <feComponentTransfer in="blurInner" result="colorInner">
          <feFuncA type="linear" slope="1.5" intercept="0"/>
      </feComponentTransfer>
      <feFlood flood-color="#ff69b4" flood-opacity="1" result="floodInner"/>
      <feComposite in="floodInner" in2="colorInner" operator="in" result="glowInner"/>

      <!-- Outer glow (signature pink/magenta) -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blurOuter"/>
      <feComponentTransfer in="blurOuter" result="colorOuter">
          <feFuncA type="linear" slope="1" intercept="0"/>
      </feComponentTransfer>
      <feFlood flood-color="#e91e63" flood-opacity="0.8" result="floodOuter"/>
      <feComposite in="floodOuter" in2="colorOuter" operator="in" result="glowOuter"/>

      <feMerge>
        <feMergeNode in="glowOuter"/>
        <feMergeNode in="glowInner"/>
        <feMergeNode in="SourceGraphic"/> <!-- Original shape -->
      </feMerge>
    </filter>

    <!-- Neon Glow Filter for Cyan elements -->
    <filter id="neonGlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Inner glow (brighter cyan) -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blurInnerC"/>
      <feComponentTransfer in="blurInnerC" result="colorInnerC">
          <feFuncA type="linear" slope="1.5" intercept="0"/>
      </feComponentTransfer>
      <feFlood flood-color="#80ffff" flood-opacity="1" result="floodInnerC"/>
      <feComposite in="floodInnerC" in2="colorInnerC" operator="in" result="glowInnerC"/>

      <!-- Outer glow (primary cyan) -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blurOuterC"/>
      <feComponentTransfer in="blurOuterC" result="colorOuterC">
          <feFuncA type="linear" slope="1" intercept="0"/>
      </feComponentTransfer>
      <feFlood flood-color="#00bcd4" flood-opacity="0.8" result="floodOuterC"/>
      <feComposite in="floodOuterC" in2="colorOuterC" operator="in" result="glowOuterC"/>

      <feMerge>
        <feMergeNode in="glowOuterC"/>
        <feMergeNode in="glowInnerC"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" fill="#0a0a14"/>

  <!-- Ada character - chunky pixel style (each "pixel" is 4x4 actual pixels) -->
  
  <!-- Head -->
  <path fill="#e91e63" d="
    M76 44 h48 v4 h-48 Z
    M72 48 h56 v4 h-56 Z
    M68 52 h64 v4 h-64 Z
    M64 56 h72 v4 h-72 Z
    M64 60 h72 v4 h-72 Z
    M64 64 h72 v4 h-72 Z
    M64 68 h72 v4 h-72 Z
    M64 72 h72 v4 h-72 Z
    M68 76 h64 v4 h-64 Z
    M72 80 h56 v4 h-56 Z
    M76 84 h48 v4 h-48 Z
  "/>

  <!-- Hair/Sideburns (darker pink) -->
  <path fill="#c2185b" d="
    M68 52 h4 v4 h-4 Z
    M64 56 h4 v8 h-4 Z
    M64 68 h4 v4 h-4 Z
    M128 52 h4 v4 h-4 Z
    M132 56 h4 v8 h-4 Z
    M132 68 h4 v4 h-4 Z
  "/>

  <!-- Neck -->
  <path fill="#e91e63" d="
    M80 88 h40 v4 h-40 Z
    M84 92 h32 v4 h-32 Z
  "/>

  <!-- Suit - Upper body -->
  <path fill="#e91e63" d="
    M68 96 h64 v4 h-64 Z
    M64 100 h72 v4 h-72 Z
    M60 104 h80 v4 h-80 Z
    M56 108 h88 v4 h-88 Z
    M52 112 h96 v4 h-96 Z
    M48 116 h104 v4 h-104 Z
    M48 120 h104 v4 h-104 Z
    M48 124 h104 v4 h-104 Z
    M52 128 h96 v4 h-96 Z
  "/>

  <!-- Eyes (cyan, glowing) -->
  <path fill="#00bcd4" filter="url(#neonGlowCyan)" d="
    M80 60 h4 v4 h-4 Z
    M116 60 h4 v4 h-4 Z
  "/>

  <!-- Mouth (darker pink) -->
  <rect x="92" y="72" width="16" height="4" fill="#c2185b"/>

  <!-- Circuit patterns on suit (cyan, glowing) -->
  <path fill="#00bcd4" filter="url(#neonGlowCyan)" d="
    M72 100 h4 v4 h-4 Z
    M76 104 h4 v4 h-4 Z
    M80 100 h4 v4 h-4 Z
    M84 104 h4 v4 h-4 Z
    M88 100 h4 v4 h-4 Z
    M92 104 h4 v4 h-4 Z
    M96 100 h4 v4 h-4 Z
    M100 104 h4 v4 h-4 Z
    M104 100 h4 v4 h-4 Z
    M108 104 h4 v4 h-4 Z
    M112 100 h4 v4 h-4 Z
    M116 104 h4 v4 h-4 Z
    M120 100 h4 v4 h-4 Z
    M124 104 h4 v4 h-4 Z
  "/>

  <!-- Digital aura / background elements (scattered glowing pixel blocks) -->
  <path fill="#e91e63" filter="url(#neonGlowPink)" d="
    M30 50 h4 v4 h-4 Z
    M34 54 h4 v4 h-4 Z
    M166 50 h4 v4 h-4 Z
    M162 54 h4 v4 h-4 Z
    M40 140 h8 v4 h-8 Z
    M36 144 h4 v8 h-4 Z
  "/>
  <path fill="#00bcd4" filter="url(#neonGlowCyan)" d="
    M26 70 h4 v4 h-4 Z
    M30 74 h4 v4 h-4 Z
    M170 70 h4 v4 h-4 Z
    M166 74 h4 v4 h-4 Z
    M150 30 h4 v4 h-4 Z
  "/>
  <path fill="#ff00ff" filter="url(#neonGlowPink)" d="
    M100 20 h4 v4 h-4 Z
    M96 24 h4 v4 h-4 Z
    M104 24 h4 v4 h-4 Z
  "/>
  <path fill="#00ff88" filter="url(#neonGlowCyan)" d="
    M60 30 h4 v4 h-4 Z
    M56 34 h4 v4 h-4 Z
    M140 150 h4 v4 h-4 Z
    M144 146 h4 v4 h-4 Z
  "/>
</svg>