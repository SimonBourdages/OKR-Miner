  <rect x="75" y="45" width="50" height="40" fill="none" stroke="#4488ff" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="110" y="50" width="50" height="35" fill="none" stroke="#4488ff" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="65" y="72" text-anchor="middle" fill="#4488ff" font-size="6" font-family="monospace">DATA-01</text>
  <text x="100" y="70" text-anchor="middle" fill="#4488ff" font-size="6" font-family="monospace">MAIN-02</text>
  <text x="135" y="72" text-anchor="middle" fill="#4488ff" font-size="6" font-family="monospace">SYNC-03</text>
  <line x1="100" y1="85" x2="100" y2="110" stroke="#4488ff" stroke-width="0.8" stroke-dasharray="3,3"/>
