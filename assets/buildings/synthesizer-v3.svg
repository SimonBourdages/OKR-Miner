<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feFlood flood-color="#ff4444" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter><radialGradient id="ar" cx="50%" cy="50%"><stop offset="0%" stop-color="#ff4444" stop-opacity="0.25"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
  <rect width="200" height="200" fill="#0a0a14"/><circle cx="100" cy="100" r="80" fill="url(#ar)"/>
  <rect x="68" y="30" width="64" height="50" rx="8" fill="#1a0808" stroke="#ff4444" stroke-width="3" filter="url(#glow)"/>
  <circle cx="86" cy="50" r="8" fill="#ff4444" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/></circle>
  <circle cx="114" cy="50" r="8" fill="#ff4444" filter="url(#glow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/></circle>
  <rect x="85" y="66" width="30" height="5" rx="2" fill="#ff4444" opacity="0.5"/>
  <rect x="75" y="80" width="50" height="60" rx="6" fill="#1a0808" stroke="#ff4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="105" r="14" fill="#ff4444" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="14;18;14" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="105" r="6" fill="#fff" opacity="0.8"/>
  <rect x="50" y="90" width="25" height="12" rx="4" fill="#1a0808" stroke="#ff4444" stroke-width="2" filter="url(#glow)"/>
  <rect x="125" y="90" width="25" height="12" rx="4" fill="#1a0808" stroke="#ff4444" stroke-width="2" filter="url(#glow)"/>
  <circle cx="50" cy="110" r="4" fill="#ff4444" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="110" r="4" fill="#ff4444" opacity="0.6">
    <animate attributeName="opacity" values="1;0.6;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="82" y="140" width="14" height="30" rx="3" fill="#1a0808" stroke="#ff4444" stroke-width="2"/>
  <rect x="104" y="140" width="14" height="30" rx="3" fill="#1a0808" stroke="#ff4444" stroke-width="2"/>
</svg>