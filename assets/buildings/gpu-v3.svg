    <rect x="80" y="140" width="10" height="18" rx="1"/><rect x="95" y="140" width="10" height="18" rx="1"/><rect x="110" y="140" width="10" height="18" rx="1"/>
    <rect x="130" y="140" width="10" height="18" rx="1"/><rect x="145" y="140" width="10" height="18" rx="1"/><rect x="160" y="140" width="10" height="18" rx="1"/>
  </g>
  <text x="100" y="180" text-anchor="middle" fill="#76ff03" font-size="10" font-family="monospace" filter="url(#glow)">5 TFLOPS ⚡</text>
</svg>