<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#ffcc00" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <rect x="30" y="40" width="140" height="100" rx="6" fill="#141408" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
  <polyline points="40,120 60,110 80,115 100,80 120,90 140,60 160,55" fill="none" stroke="#ffcc00" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="160" cy="55" r="4" fill="#ffcc00"><animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/></circle>
  <line x1="40" y1="130" x2="160" y2="130" stroke="#ffcc00" stroke-width="0.5" opacity="0.3"/>
  <g fill="#ffcc00" opacity="0.15">
    <rect x="45" y="95" width="12" height="25"/><rect x="65" y="90" width="12" height="30"/>
    <rect x="85" y="85" width="12" height="35"/><rect x="105" y="75" width="12" height="45"/>
    <rect x="125" y="65" width="12" height="55"/><rect x="145" y="55" width="12" height="65"/>
  </g>
  <text x="100" y="155" text-anchor="middle" fill="#ffcc00" font-size="8" font-family="monospace" opacity="0.6">2% INTEREST/s</text>
  <text x="100" y="192" text-anchor="middle" fill="#ffcc00" font-size="10" font-family="monospace" opacity="0.7">INVESTMENT</text>
</svg>