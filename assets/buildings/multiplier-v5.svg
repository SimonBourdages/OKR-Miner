    <rect x="80" y="80" width="40" height="40" fill="#9933ff" opacity="0.3"/>
    <rect x="80" y="80" width="40" height="40" fill="none" stroke="#9933ff" stroke-width="3"/>
    <text x="100" y="106" text-anchor="middle" fill="#9933ff" font-size="16" font-family="monospace" font-weight="bold">×</text>
    <rect x="30" y="30" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="50" y1="40" x2="80" y2="80" stroke="#9933ff" stroke-width="2"/>
    <rect x="150" y="30" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="150" y1="40" x2="120" y2="80" stroke="#9933ff" stroke-width="2"/>
    <rect x="30" y="150" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="50" y1="160" x2="80" y2="120" stroke="#9933ff" stroke-width="2"/>
    <rect x="150" y="150" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="150" y1="160" x2="120" y2="120" stroke="#9933ff" stroke-width="2"/>
    <rect x="90" y="10" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="100" y1="30" x2="100" y2="80" stroke="#9933ff" stroke-width="2"/>
    <rect x="90" y="170" width="20" height="20" fill="#9933ff" opacity="0.5"/><line x1="100" y1="170" x2="100" y2="120" stroke="#9933ff" stroke-width="2"/>
