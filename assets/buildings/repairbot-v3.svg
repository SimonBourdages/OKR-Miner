  </filter><radialGradient id="pr" cx="50%" cy="50%"><stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
  <rect width="200" height="200" fill="#0a0a14"/><circle cx="100" cy="100" r="80" fill="url(#pr)"/>
