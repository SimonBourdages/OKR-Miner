<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
    <radialGradient id="rg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <circle cx="100" cy="80" r="80" fill="url(#rg1)"/>
  <rect x="92" y="70" width="16" height="110" rx="4" fill="#1a3a2a" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="100" cy="55" rx="35" ry="12" fill="rgb(0,102,54)" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="100" cy="55" rx="25" ry="8" fill="#00ff88" opacity="0.3"/>
  <circle cx="100" cy="55" r="5" fill="#fff" opacity="0.9">
    <animate attributeName="r" values="5;7;5" dur="1s" repeatCount="indefinite"/>
  </circle>
  <g opacity="0.8">
    <line x1="100" y1="55" x2="50" y2="30" stroke="#00ff88" stroke-width="2" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="55" x2="150" y2="25" stroke="#00ff88" stroke-width="2" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="55" x2="160" y2="60" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <circle cx="50" cy="30" r="4" fill="#00ff88"><animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="25" r="4" fill="#00ff88"><animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="60" r="3" fill="#00ff88"><animate attributeName="r" values="3;5;3" dur="1.3s" repeatCount="indefinite"/></circle>
  </g>
  <rect x="80" y="170" width="40" height="6" rx="3" fill="#00ff88" opacity="0.5"/>
</svg>