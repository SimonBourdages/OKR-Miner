  <rect x="80" y="85" width="40" height="50" rx="4" fill="#1a0a0a" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="105" r="10" fill="#ff4444" opacity="0.3"><animate attributeName="r" values="10;13;10" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="105" r="4" fill="#fff" opacity="0.6"/>
  <rect x="60" y="95" width="20" height="8" rx="3" fill="rgb(102,27,27)" stroke="#ff4444" stroke-width="1"/>
