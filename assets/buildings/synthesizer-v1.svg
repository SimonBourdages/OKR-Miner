  <circle cx="88" cy="58" r="6" fill="#ff4444" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="112" cy="58" r="6" fill="#ff4444" opacity="0.8"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
