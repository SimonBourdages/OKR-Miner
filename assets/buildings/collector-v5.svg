<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
    <filter id="crt"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="bnoise"/>
      <feBlend in="SourceGraphic" in2="bnoise" mode="multiply"/></filter>
  </defs>
  <rect width="200" height="200" fill="#080810"/>
  <g filter="url(#crt)">
    <rect x="90" y="30" width="20" height="10" fill="#00ff88" filter="url(#glow)"/>
    <rect x="80" y="40" width="40" height="10" fill="#00ff88" filter="url(#glow)"/>
    <rect x="90" y="50" width="20" height="10" fill="#00ff88" opacity="0.8"/>
    <rect x="95" y="60" width="10" height="80" fill="#00ff88" opacity="0.6"/>
    <rect x="85" y="140" width="30" height="10" fill="#00ff88" opacity="0.8"/>
    <rect x="80" y="150" width="40" height="10" fill="#00ff88" filter="url(#glow)"/>
    <rect x="60" y="40" width="10" height="10" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="40" width="10" height="10" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="30" width="10" height="10" fill="#00ff88" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="30" width="10" height="10" fill="#00ff88" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="100" y="185" text-anchor="middle" fill="#00ff88" font-size="12" font-family="monospace" filter="url(#glow)">RECRUIT</text>
</svg>