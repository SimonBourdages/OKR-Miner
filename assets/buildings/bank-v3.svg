<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feFlood flood-color="#ffcc00" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter><radialGradient id="ir" cx="50%" cy="45%"><stop offset="0%" stop-color="#ffcc00" stop-opacity="0.2"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
  <rect width="200" height="200" fill="#0a0a14"/><circle cx="100" cy="90" r="80" fill="url(#ir)"/>
  <rect x="25" y="30" width="150" height="110" rx="8" fill="#141408" stroke="#ffcc00" stroke-width="3" filter="url(#glow)"/>
  <polyline points="35,120 55,108 75,112 95,70 115,82 135,48 165,42" fill="none" stroke="#ffcc00" stroke-width="3" filter="url(#glow)">
    <animate attributeName="points" values="35,120 55,108 75,112 95,70 115,82 135,48 165,42;35,118 55,105 75,110 95,68 115,78 135,45 165,38;35,120 55,108 75,112 95,70 115,82 135,48 165,42" dur="4s" repeatCount="indefinite"/>
  </polyline>
  <circle cx="165" cy="42" r="6" fill="#ffcc00" filter="url(#glow)"><animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/></circle>
  <text x="165" y="30" fill="#ffcc00" font-size="16" font-family="sans-serif" font-weight="bold" filter="url(#glow)">↑</text>
  <g fill="#ffcc00" opacity="0.2">
    <rect x="40" y="85" width="15" height="35" rx="2"/><rect x="60" y="78" width="15" height="42" rx="2"/>
    <rect x="80" y="70" width="15" height="50" rx="2"/><rect x="100" y="60" width="15" height="60" rx="2"/>
    <rect x="120" y="50" width="15" height="70" rx="2"/><rect x="140" y="42" width="15" height="78" rx="2"/>
  </g>
  <text x="100" y="160" text-anchor="middle" fill="#ffcc00" font-size="12" font-family="monospace" filter="url(#glow)">+2% $/s</text>
</svg>