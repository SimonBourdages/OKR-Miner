<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#00ff88" stroke-width="0.2" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#060614"/>
  <rect width="200" height="200" fill="url(#grid)"/>
  <path d="M100 40 L100 170" stroke="#00ff88" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <polygon points="100,35 115,55 108,55 108,90 92,90 92,55 85,55" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="88" y="90" width="24" height="60" fill="none" stroke="#00ff88" stroke-width="1.2"/>
  <rect x="92" y="95" width="16" height="8" fill="#00ff88" opacity="0.2"/>
  <circle cx="100" cy="45" r="4" fill="#00ff88" opacity="0.7"/>
  <path d="M75 70 Q100 50 125 70" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3">
    <animate attributeName="d" values="M75 70 Q100 50 125 70;M65 65 Q100 40 135 65;M75 70 Q100 50 125 70" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M60 80 Q100 45 140 80" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,4">
    <animate attributeName="d" values="M60 80 Q100 45 140 80;M50 75 Q100 35 150 75;M60 80 Q100 45 140 80" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <rect x="80" y="150" width="40" height="15" fill="none" stroke="#00ff88" stroke-width="1"/>
  <text x="100" y="162" text-anchor="middle" fill="#00ff88" font-size="7" font-family="monospace">TALENT.SYS</text>
  <text x="15" y="15" fill="#00ff88" font-size="7" font-family="monospace" opacity="0.4">SCHEMATIC-01</text>
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
</svg>