<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#ff9800" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <rect x="40" y="60" width="120" height="90" rx="6" fill="#1a1408" stroke="#ff9800" stroke-width="2" filter="url(#glow)"/>
  <rect x="45" y="55" width="110" height="12" rx="3" fill="#ff9800" opacity="0.3"/>
  <circle cx="100" cy="105" r="22" fill="none" stroke="#ff9800" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="105" r="14" fill="#ff9800" opacity="0.2"/>
  <text x="100" y="112" text-anchor="middle" fill="#ff9800" font-size="18" font-family="serif" font-weight="bold">$</text>
  <circle cx="60" cy="80" r="3" fill="#ff9800" opacity="0.5"/><circle cx="140" cy="80" r="3" fill="#ff9800" opacity="0.5"/>
  <circle cx="60" cy="130" r="3" fill="#ff9800" opacity="0.5"/><circle cx="140" cy="130" r="3" fill="#ff9800" opacity="0.5"/>
  <circle cx="70" cy="40" r="8" fill="#ff9800" opacity="0.4"><animate attributeName="cy" values="40;35;40" dur="3s" repeatCount="indefinite"/></circle>
  <text x="70" y="44" text-anchor="middle" fill="#0a0a14" font-size="10" font-family="serif" font-weight="bold">$</text>
  <circle cx="130" cy="38" r="6" fill="#ff9800" opacity="0.3"><animate attributeName="cy" values="38;30;38" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="42" r="7" fill="#ff9800" opacity="0.35"><animate attributeName="cy" values="42;34;42" dur="3.5s" repeatCount="indefinite"/></circle>
  <rect x="55" y="155" width="90" height="6" rx="3" fill="#ff9800" opacity="0.2"/>
  <text x="100" y="192" text-anchor="middle" fill="#ff9800" font-size="10" font-family="monospace" opacity="0.7">FINANCES</text>
</svg>