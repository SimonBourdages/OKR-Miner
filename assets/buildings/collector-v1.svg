<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter><pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="rgba(255,255,255,0.03)"/>
  </pattern></defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <rect width="200" height="200" fill="url(#scanlines)"/>
  <rect x="90" y="80" width="20" height="90" rx="3" fill="rgb(0,102,54)" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="85" y="170" width="30" height="10" rx="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="100" cy="68" r="18" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="68" r="8" fill="#00ff88" opacity="0.8"/>
  <circle cx="100" cy="68" r="3" fill="#fff"/>
  <circle cx="100" cy="68" r="32" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="32;50;32" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="68" r="45" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2">
    <animate attributeName="r" values="45;65;45" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <line x1="80" y1="110" x2="60" y2="120" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="110" x2="140" y2="120" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <text x="100" y="195" text-anchor="middle" fill="#00ff88" font-size="10" font-family="monospace" opacity="0.7">RECRUITER</text>
</svg>