<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#00e5ff" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter><pattern id="pg" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="none" stroke="#00e5ff" stroke-width="0.15" opacity="0.1"/></pattern></defs>
  <rect width="200" height="200" fill="#060614"/><rect width="200" height="200" fill="url(#pg)"/>
  <polygon points="100,45 140,90 60,90" fill="none" stroke="#ff8800" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="100" y="78" text-anchor="middle" fill="#ff8800" font-size="6" font-family="monospace">PIZZA.SYS</text>
  <rect x="50" y="95" width="100" height="15" fill="none" stroke="#ff8800" stroke-width="0.8" stroke-dasharray="3,3"/>
  <rect x="55" y="115" width="90" height="45" fill="none" stroke="#00e5ff" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="100" y="142" text-anchor="middle" fill="#00e5ff" font-size="7" font-family="monospace">REPAIR MODULE</text>
  <text x="60" y="155" fill="#00e5ff" font-size="6" font-family="monospace" opacity="0.5">HEAL: 15 HP/s</text>
  <text x="15" y="15" fill="#00e5ff" font-size="7" font-family="monospace" opacity="0.4">DRONE-SPEC</text>
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
</svg>