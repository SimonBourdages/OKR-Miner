<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#76ff03" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <rect x="30" y="55" width="140" height="80" rx="6" fill="#0a1a0a" stroke="#76ff03" stroke-width="2" filter="url(#glow)"/>
  <circle cx="65" cy="95" r="20" fill="none" stroke="#76ff03" stroke-width="2"/><circle cx="65" cy="95" r="12" fill="none" stroke="#76ff03" stroke-width="1" opacity="0.5"/>
  <circle cx="65" cy="95" r="3" fill="#76ff03"/><line x1="65" y1="75" x2="65" y2="80" stroke="#76ff03" stroke-width="1.5" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" values="0 65 95;360 65 95" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="135" cy="95" r="20" fill="none" stroke="#76ff03" stroke-width="2"/><circle cx="135" cy="95" r="12" fill="none" stroke="#76ff03" stroke-width="1" opacity="0.5"/>
  <circle cx="135" cy="95" r="3" fill="#76ff03"/>
  <g fill="#76ff03" opacity="0.4">
    <rect x="40" y="65" width="12" height="4" rx="1"/><rect x="58" y="65" width="12" height="4" rx="1"/>
    <rect x="130" y="65" width="12" height="4" rx="1"/><rect x="148" y="65" width="12" height="4" rx="1"/>
  </g>
  <rect x="90" y="70" width="20" height="12" rx="2" fill="#76ff03" opacity="0.3" stroke="#76ff03" stroke-width="0.8"/>
  <text x="100" y="79" text-anchor="middle" fill="#76ff03" font-size="6" font-family="monospace">GPU</text>
  <g fill="#76ff03" opacity="0.5">
    <rect x="35" y="140" width="8" height="15"/><rect x="48" y="140" width="8" height="15"/><rect x="61" y="140" width="8" height="15"/>
    <rect x="80" y="140" width="8" height="15"/><rect x="93" y="140" width="8" height="15"/><rect x="106" y="140" width="8" height="15"/>
    <rect x="125" y="140" width="8" height="15"/><rect x="138" y="140" width="8" height="15"/><rect x="151" y="140" width="8" height="15"/>
  </g>
  <text x="100" y="192" text-anchor="middle" fill="#76ff03" font-size="10" font-family="monospace" opacity="0.7">GPU</text>
</svg>