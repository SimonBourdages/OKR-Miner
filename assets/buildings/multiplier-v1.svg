<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#9933ff" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <circle cx="100" cy="100" r="20" fill="rgb(61,20,102)" stroke="#9933ff" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="8" fill="#9933ff" opacity="0.6"><animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="100" r="3" fill="#fff"/>
  <g stroke="#9933ff" stroke-width="1.5" filter="url(#glow)">
    <line x1="120" y1="100" x2="165" y2="65"/><line x1="120" y1="100" x2="165" y2="135"/>
    <line x1="80" y1="100" x2="35" y2="65"/><line x1="80" y1="100" x2="35" y2="135"/>
    <line x1="100" y1="80" x2="100" y2="35"/><line x1="100" y1="120" x2="100" y2="165"/>
    <line x1="115" y1="85" x2="150" y2="40"/><line x1="85" y1="115" x2="50" y2="160"/>
  </g>
  <g fill="#9933ff" filter="url(#glow)">
    <circle cx="165" cy="65" r="7"/><circle cx="165" cy="135" r="7"/>
    <circle cx="35" cy="65" r="7"/><circle cx="35" cy="135" r="7"/>
    <circle cx="100" cy="35" r="7"/><circle cx="100" cy="165" r="7"/>
    <circle cx="150" cy="40" r="5" opacity="0.7"/><circle cx="50" cy="160" r="5" opacity="0.7"/>
  </g>
  <circle cx="100" cy="100" r="35" fill="none" stroke="#9933ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="20s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="192" text-anchor="middle" fill="#9933ff" font-size="9" font-family="monospace" opacity="0.7">NET HUB</text>
</svg>