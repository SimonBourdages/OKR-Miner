<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
    <clipPath id="holo"><rect x="20" y="20" width="160" height="160" rx="8"/></clipPath>
  </defs>
  <rect width="200" height="200" fill="#0a0a14"/>
  <g clip-path="url(#holo)" opacity="0.85">
    <rect x="94" y="60" width="12" height="100" fill="#00ff88" opacity="0.15"/>
    <polygon points="100,40 120,60 108,60 108,100 92,100 92,60 80,60" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)" stroke-dasharray="6,2"/>
    <ellipse cx="100" cy="45" rx="30" ry="10" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5">
      <animate attributeName="ry" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <g opacity="0.3">
      <line x1="20" y1="50" x2="180" y2="50" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="20" y1="70" x2="180" y2="70" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="20" y1="90" x2="180" y2="90" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="20" y1="110" x2="180" y2="110" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="20" y1="130" x2="180" y2="130" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="20" y1="150" x2="180" y2="150" stroke="#00ff88" stroke-width="0.5"/>
    </g>
    <rect x="70" y="160" width="60" height="8" rx="2" fill="#00ff88" opacity="0.2"/>
    <text x="100" y="167" text-anchor="middle" fill="#00ff88" font-size="6" font-family="monospace">SCANNING...</text>
    <rect x="20" y="20" width="160" height="160" rx="8" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  </g>
  <rect x="25" y="175" width="30" height="4" rx="2" fill="#00ff88" opacity="0.5">
    <animate attributeName="width" values="30;60;30" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>