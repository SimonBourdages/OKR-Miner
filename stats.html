<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKR Miner — Player Analytics Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0a0a0a;
    color: #c8e6c9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
}

a { color: #00e676; text-decoration: none; }
a:hover { text-decoration: underline; }

.top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; margin-bottom: 10px; border-bottom: 1px solid #1b5e20;
}
.top-bar .back { font-size: 14px; }

h1 {
    text-align: center; color: #00e676; font-size: 28px;
    text-shadow: 0 0 20px rgba(0,230,118,0.4); margin-bottom: 4px;
}
.subtitle {
    text-align: center; color: #4db6ac; font-size: 13px;
    margin-bottom: 24px; font-style: italic; opacity: 0.7;
}

.no-data-banner {
    text-align: center; padding: 60px 20px; color: #555;
    font-size: 18px; border: 1px dashed #333; border-radius: 12px; margin: 40px auto; max-width: 600px;
}

/* Summary Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card {
    background: linear-gradient(135deg, #1a1a2e 0%, #0d1117 100%);
    border: 1px solid #1b5e20; border-radius: 10px; padding: 18px;
    transition: transform 0.2s, border-color 0.2s;
}
.card:hover { transform: translateY(-2px); border-color: #00e676; }
.card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #4db6ac; margin-bottom: 6px; }
.card .value { font-size: 26px; font-weight: 700; color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.3); }
.card .sub { font-size: 12px; color: #666; margin-top: 4px; }

/* Section */
.section {
    background: #0d1117; border: 1px solid #1b5e20; border-radius: 12px;
    padding: 24px; margin-bottom: 28px;
}
.section h2 {
    color: #00e676; font-size: 18px; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid #1b5e2055;
}

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
    background: #1a1a2e; color: #4db6ac; padding: 10px 12px;
    text-align: left; cursor: pointer; user-select: none; white-space: nowrap;
    border-bottom: 2px solid #1b5e20;
}
th:hover { color: #00e676; }
th .sort-arrow { margin-left: 4px; font-size: 10px; }
td { padding: 8px 12px; border-bottom: 1px solid #1a1a2e; }
tr.row-long { background: rgba(0,230,118,0.05); }
tr.row-short { background: rgba(244,67,54,0.05); }
tr:hover { background: rgba(0,230,118,0.1); }

/* Canvas charts */
.chart-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
canvas { display: block; width: 100%; border-radius: 8px; }

.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 28px; }
@media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }

/* Raw data */
.raw-toggle {
    background: #1a1a2e; color: #4db6ac; border: 1px solid #1b5e20;
    padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;
    margin-bottom: 12px; font-family: inherit;
}
.raw-toggle:hover { border-color: #00e676; color: #00e676; }
.raw-content { display: none; }
.raw-content.open { display: block; }
pre.json-view {
    background: #0a0a0a; border: 1px solid #1b5e20; border-radius: 8px;
    padding: 16px; overflow: auto; max-height: 500px; font-size: 12px;
    color: #81c784; white-space: pre-wrap; word-break: break-all;
}
.btn {
    background: #1b5e20; color: #c8e6c9; border: none; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 8px;
    font-family: inherit; transition: background 0.2s;
}
.btn:hover { background: #2e7d32; }
.btn-danger { background: #b71c1c; }
.btn-danger:hover { background: #d32f2f; }

.refresh-indicator {
    position: fixed; bottom: 16px; right: 16px; background: #1a1a2e;
    border: 1px solid #1b5e20; border-radius: 20px; padding: 6px 14px;
    font-size: 11px; color: #4db6ac; opacity: 0.7;
}
</style>
</head>
<body>

<div class="top-bar">
    <a href="./index.html" class="back">← Back to Game</a>
    <span style="color:#555; font-size:12px;" id="refreshTimer">Auto-refresh: 5s</span>
</div>

<h1>OKR Miner — Player Analytics Dashboard</h1>
<p class="subtitle">Hidden admin stats page</p>

<div id="dashboard"></div>
<div class="refresh-indicator" id="refreshBadge">Live ●</div>

<script>
// ─── Helpers ────────────────────────────────────────────────────────────
function fmt(n) {
    if (n == null || isNaN(n)) return '0';
    const abs = Math.abs(n);
    if (abs >= 1e12) return (n / 1e12).toFixed(2) + 'T';
    if (abs >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return (n / 1e3).toFixed(2) + 'K';
    return Number(n).toFixed(n % 1 !== 0 ? 2 : 0);
}

function fmtTime(seconds) {
    if (!seconds || seconds <= 0) return '0s';
    const s = Math.floor(seconds);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const parts = [];
    if (h) parts.push(h + 'h');
    if (m) parts.push(m + 'm');
    if (sec || parts.length === 0) parts.push(sec + 's');
    return parts.join(' ');
}

function fmtHM(seconds) {
    if (!seconds) return '0:00';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    return h + ':' + String(m).padStart(2, '0');
}

function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtDateShort(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString();
}

function loadData() {
    try {
        const raw = localStorage.getItem('okrMinerAnalytics');
        if (!raw) return null;
        return JSON.parse(raw);
    } catch { return null; }
}

// ─── Chart Utilities ────────────────────────────────────────────────────
const COLORS = {
    collector: '#4caf50', processor: '#2196f3', multiplier: '#9c27b0',
    defender: '#ff9800', refiner: '#00bcd4', generator: '#e91e63',
    hub: '#ffc107', beacon: '#8bc34a', factory: '#607d8b', default: '#4db6ac'
};
const PIE_COLORS = ['#00e676','#00bcd4','#ff9800','#e91e63','#9c27b0','#ffc107','#2196f3','#8bc34a','#f44336','#607d8b'];
const THEME_COLORS = {
    emerald: '#00e676', neon: '#00ffff', ruby: '#f44336', amber: '#ffc107',
    sapphire: '#2196f3', violet: '#9c27b0', sunset: '#ff5722', ocean: '#00bcd4',
    default: '#4db6ac'
};

function clearCanvas(ctx, w, h) {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);
}

function noDataMsg(ctx, w, h) {
    ctx.fillStyle = '#333';
    ctx.font = '16px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet', w / 2, h / 2);
}

function drawHBarChart(canvasId, data, colorMap, labelWidth) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const entries = Object.entries(data || {}).sort((a, b) => b[1] - a[1]);
    const rowH = 32;
    const pad = 20;
    const lw = labelWidth || 110;
    const h = Math.max(entries.length * rowH + pad * 2, 100);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    clearCanvas(ctx, w, h);

    if (!entries.length) { noDataMsg(ctx, w, h); return; }

    const maxVal = Math.max(...entries.map(e => e[1]), 1);
    const barArea = w - lw - pad * 2;

    entries.forEach(([key, val], i) => {
        const y = pad + i * rowH;
        const barW = (val / maxVal) * barArea;
        const col = colorMap[key] || COLORS.default;

        ctx.fillStyle = '#c8e6c9';
        ctx.font = '12px Segoe UI';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(key, lw - 8, y + rowH / 2);

        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.roundRect(lw, y + 4, Math.max(barW, 2), rowH - 8, 4);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = '11px Segoe UI';
        ctx.fillText(fmt(val), lw + barW + 6, y + rowH / 2);
    });
}

function drawPieChart(canvasId, data, colorMap, useColorArray) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const size = Math.min(canvas.clientWidth, 360);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.height = size + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    clearCanvas(ctx, size, size);

    const entries = Object.entries(data || {}).filter(e => e[1] > 0);
    if (!entries.length) { noDataMsg(ctx, size, size); return; }

    const total = entries.reduce((s, e) => s + e[1], 0);
    const cx = size / 2, cy = size * 0.45, r = size * 0.32;
    let startAngle = -Math.PI / 2;

    entries.forEach(([key, val], i) => {
        const slice = (val / total) * Math.PI * 2;
        const col = useColorArray ? PIE_COLORS[i % PIE_COLORS.length] : (colorMap[key] || PIE_COLORS[i % PIE_COLORS.length]);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, startAngle + slice);
        ctx.closePath();
        ctx.fillStyle = col;
        ctx.fill();

        // Label
        const midAngle = startAngle + slice / 2;
        const lx = cx + Math.cos(midAngle) * (r + 20);
        const ly = cy + Math.sin(midAngle) * (r + 20);
        ctx.fillStyle = '#c8e6c9';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = Math.cos(midAngle) > 0 ? 'left' : 'right';
        ctx.textBaseline = 'middle';
        const pct = ((val / total) * 100).toFixed(1) + '%';
        ctx.fillText(key + ' ' + pct, lx, ly);

        startAngle += slice;
    });
}

function drawStackedBar(canvasId, data) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const entries = Object.entries(data || {});
    const rowH = 40;
    const pad = 20;
    const lw = 110;
    const h = Math.max(entries.length * rowH + pad * 2 + 30, 100);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    clearCanvas(ctx, w, h);

    if (!entries.length) { noDataMsg(ctx, w, h); return; }

    const lvColors = ['#1b5e20', '#4caf50', '#00e676', '#69f0ae', '#b9f6ca'];
    let maxTotal = 0;
    entries.forEach(([, levels]) => {
        const t = Object.values(levels).reduce((s, v) => s + v, 0);
        if (t > maxTotal) maxTotal = t;
    });
    if (!maxTotal) maxTotal = 1;
    const barArea = w - lw - pad * 2;

    // Legend
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'left';
    const lvls = [1, 2, 3, 4, 5];
    lvls.forEach((lv, i) => {
        const lx = lw + i * 70;
        ctx.fillStyle = lvColors[i] || lvColors[0];
        ctx.fillRect(lx, pad - 14, 10, 10);
        ctx.fillStyle = '#888';
        ctx.fillText('Lv.' + lv, lx + 14, pad - 5);
    });

    entries.forEach(([bType, levels], i) => {
        const y = pad + 10 + i * rowH;
        ctx.fillStyle = '#c8e6c9';
        ctx.font = '12px Segoe UI';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(bType, lw - 8, y + rowH / 2);

        let xOff = lw;
        const sortedLevels = Object.entries(levels).sort((a, b) => Number(a[0]) - Number(b[0]));
        sortedLevels.forEach(([lv, count]) => {
            const segW = (count / maxTotal) * barArea;
            const li = Math.max(0, Number(lv) - 1);
            ctx.fillStyle = lvColors[li] || lvColors[0];
            if (segW > 0) {
                ctx.fillRect(xOff, y + 6, Math.max(segW, 1), rowH - 12);
                if (segW > 20) {
                    ctx.fillStyle = '#000';
                    ctx.font = '10px Segoe UI';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(count, xOff + segW / 2, y + rowH / 2);
                }
            }
            xOff += segW;
        });
    });
}

function drawScatter(canvasId, points) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const h = 300;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    clearCanvas(ctx, w, h);

    if (!points || !points.length) { noDataMsg(ctx, w, h); return; }

    const pad = 50;
    const plotW = w - pad * 2;
    const plotH = h - pad * 2;
    const maxX = Math.max(...points.map(p => p.milestones || 0), 1);
    const maxY = Math.max(...points.map(p => p.playTime || 0), 1);

    // Axes
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad); ctx.lineTo(w - pad, h - pad);
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#4db6ac';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Milestones Reached', w / 2, h - 8);
    ctx.save();
    ctx.translate(12, h / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Play Time', 0, 0);
    ctx.restore();

    // Tick marks on X
    for (let i = 0; i <= 5; i++) {
        const v = Math.round((maxX / 5) * i);
        const x = pad + (v / maxX) * plotW;
        ctx.fillStyle = '#555';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(v, x, h - pad + 16);
    }
    // Tick marks on Y
    for (let i = 0; i <= 5; i++) {
        const v = (maxY / 5) * i;
        const y = h - pad - (v / maxY) * plotH;
        ctx.fillStyle = '#555';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText(fmtTime(v), pad - 6, y + 3);
    }

    // Points
    points.forEach(p => {
        const x = pad + ((p.milestones || 0) / maxX) * plotW;
        const y = h - pad - ((p.playTime || 0) / maxY) * plotH;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = p.mode === 'infinite' ? '#00bcd4' : '#00e676';
        ctx.fill();
        ctx.strokeStyle = '#fff3';
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    // Legend
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#00e676';
    ctx.beginPath(); ctx.arc(w - pad - 120, pad + 10, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#c8e6c9';
    ctx.fillText('Normal', w - pad - 112, pad + 14);
    ctx.fillStyle = '#00bcd4';
    ctx.beginPath(); ctx.arc(w - pad - 120, pad + 26, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#c8e6c9';
    ctx.fillText('Infinite', w - pad - 112, pad + 30);
}

function drawFunnel(canvasId, milestoneReachTimes, quitPoints) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;

    // Build funnel data: count how many sessions reached each milestone
    const milestoneCounts = {};
    if (quitPoints && quitPoints.length) {
        quitPoints.forEach(qp => {
            const ms = qp.milestones || 0;
            for (let i = 0; i <= ms; i++) {
                milestoneCounts[i] = (milestoneCounts[i] || 0) + 1;
            }
        });
    }
    // Also include milestoneReachTimes keys
    if (milestoneReachTimes) {
        Object.keys(milestoneReachTimes).forEach(k => {
            if (!(k in milestoneCounts)) milestoneCounts[k] = 1;
        });
    }

    const entries = Object.entries(milestoneCounts)
        .map(([k, v]) => [Number(k), v])
        .sort((a, b) => a[0] - b[0]);

    const rowH = 34;
    const pad = 20;
    const lw = 90;
    const h = Math.max(entries.length * rowH + pad * 2, 100);
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    clearCanvas(ctx, w, h);

    if (!entries.length) { noDataMsg(ctx, w, h); return; }

    const maxVal = Math.max(...entries.map(e => e[1]), 1);
    const barArea = w - lw - pad * 2;

    entries.forEach(([ms, count], i) => {
        const y = pad + i * rowH;
        const barW = (count / maxVal) * barArea;
        const centerX = lw + barArea / 2;
        const halfW = barW / 2;
        const alpha = 1 - (i / entries.length) * 0.5;

        ctx.fillStyle = `rgba(0,230,118,${alpha})`;
        ctx.beginPath();
        ctx.roundRect(centerX - halfW, y + 4, barW, rowH - 8, 4);
        ctx.fill();

        ctx.fillStyle = '#c8e6c9';
        ctx.font = '12px Segoe UI';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText('MS ' + ms, lw - 8, y + rowH / 2);

        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.font = '11px Segoe UI';
        ctx.fillText(count + ' sessions', centerX, y + rowH / 2);
    });
}

function drawHistogram(canvasId, sessions) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const h = 260;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    clearCanvas(ctx, w, h);

    if (!sessions || !sessions.length) { noDataMsg(ctx, w, h); return; }

    const buckets = [
        { label: '<1m', min: 0, max: 60, count: 0 },
        { label: '1-5m', min: 60, max: 300, count: 0 },
        { label: '5-15m', min: 300, max: 900, count: 0 },
        { label: '15-30m', min: 900, max: 1800, count: 0 },
        { label: '30-60m', min: 1800, max: 3600, count: 0 },
        { label: '1hr+', min: 3600, max: Infinity, count: 0 },
    ];

    sessions.forEach(s => {
        const dur = s.duration || 0;
        for (const b of buckets) {
            if (dur >= b.min && dur < b.max) { b.count++; break; }
        }
    });

    const pad = 50;
    const plotW = w - pad * 2;
    const plotH = h - pad * 2;
    const maxC = Math.max(...buckets.map(b => b.count), 1);
    const barW = plotW / buckets.length * 0.7;
    const gap = plotW / buckets.length;

    // Axes
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad); ctx.lineTo(w - pad, h - pad);
    ctx.stroke();

    buckets.forEach((b, i) => {
        const x = pad + i * gap + (gap - barW) / 2;
        const barH = (b.count / maxC) * plotH;
        const y = h - pad - barH;

        const gradient = ctx.createLinearGradient(x, y, x, h - pad);
        gradient.addColorStop(0, '#00e676');
        gradient.addColorStop(1, '#1b5e20');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
        ctx.fill();

        // Label
        ctx.fillStyle = '#4db6ac';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(b.label, pad + i * gap + gap / 2, h - pad + 16);

        // Count on top
        if (b.count > 0) {
            ctx.fillStyle = '#c8e6c9';
            ctx.font = '12px Segoe UI';
            ctx.fillText(b.count, pad + i * gap + gap / 2, y - 6);
        }
    });
}

// ─── Sorting state ──────────────────────────────────────────────────────
let sortCol = null;
let sortDir = 1;

// ─── Render ─────────────────────────────────────────────────────────────
function render() {
    const data = loadData();
    const dash = document.getElementById('dashboard');

    if (!data || (!data.sessions && !data.aggregated)) {
        dash.innerHTML = '<div class="no-data-banner">No analytics data found.<br><br>Play OKR Miner to generate data!<br><small>Looking for <code>okrMinerAnalytics</code> in localStorage</small></div>';
        return;
    }

    const agg = data.aggregated || {};
    const sessions = data.sessions || [];

    // Build HTML
    let html = '';

    // ── 1. Summary Cards ──
    html += '<div class="cards">';
    html += card('Total Sessions', agg.totalSessions || sessions.length, '');
    html += card('Total Play Time', fmtHM(agg.totalPlayTime) + ' hrs', fmtTime(agg.totalPlayTime));
    html += card('Buildings Placed', fmt(agg.totalBuildsPlaced || agg.totalBuildingsPlaced || 0), '');
    html += card('Total Upgrades', fmt(agg.totalUpgradesDone || 0), '');
    html += card('Highest OKR', fmt(agg.highestOKRReached), '');
    html += card('Highest Milestone', agg.highestMilestone != null ? agg.highestMilestone : '—', '');
    html += card('Peak OKR/s', fmt(agg.peakOKRRate), '');
    html += card('Peak AC/s', fmt(agg.peakACRate), '');
    html += card('Normal Sessions', agg.normalModeSessions || 0, '');
    html += card('Infinite Sessions', agg.infiniteModeSessions || 0, '');
    html += card('First Played', fmtDateShort(agg.firstPlayDate), '');
    html += card('Last Played', fmtDateShort(agg.lastPlayDate), '');
    html += '</div>';

    // ── 2. Session Timeline ──
    html += '<div class="section"><h2>📋 Session Timeline (Last 20)</h2><div class="table-wrap">';
    html += '<table id="sessionTable"><thead><tr>';
    const cols = [
        { key: 'startTime', label: 'Date' },
        { key: 'duration', label: 'Duration' },
        { key: 'mode', label: 'Mode' },
        { key: 'buildingsPlaced', label: 'Buildings' },
        { key: 'milestonesReached', label: 'Milestones' },
        { key: 'peakOKR', label: 'Peak OKR' },
        { key: 'endReason', label: 'End Reason' },
    ];
    cols.forEach(c => {
        const arrow = sortCol === c.key ? (sortDir === 1 ? '▲' : '▼') : '';
        html += `<th data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
    });
    html += '</tr></thead><tbody>';

    let sorted = sessions.slice(-20).reverse();
    if (sortCol) {
        sorted.sort((a, b) => {
            let va = a[sortCol], vb = b[sortCol];
            if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
            return ((va || 0) - (vb || 0)) * sortDir;
        });
    }

    sorted.forEach(s => {
        const dur = s.duration || 0;
        const cls = dur >= 1800 ? 'row-long' : dur < 60 ? 'row-short' : '';
        html += `<tr class="${cls}">`;
        html += `<td>${fmtDate(s.startTime)}</td>`;
        html += `<td>${fmtTime(dur)}</td>`;
        html += `<td>${s.mode || '—'}</td>`;
        html += `<td>${s.buildingsPlaced || 0}</td>`;
        html += `<td>${s.milestonesReached != null ? s.milestonesReached : (s.finalMilestones != null ? s.finalMilestones : '—')}</td>`;
        html += `<td>${fmt(s.peakOKR)}</td>`;
        html += `<td>${s.endReason || '—'}</td>`;
        html += '</tr>';
    });

    html += '</tbody></table></div></div>';

    // ── 3. Building Popularity ──
    html += '<div class="section"><h2>🏗️ Building Popularity</h2><div class="chart-container"><canvas id="chartBuildings"></canvas></div></div>';

    // ── 4. Milestone Funnel ──
    html += '<div class="section"><h2>🔽 Milestone Funnel</h2><div class="chart-container"><canvas id="chartFunnel"></canvas></div></div>';

    // ── 5. Quit Point Analysis ──
    html += '<div class="section"><h2>🚪 Quit Point Analysis</h2><div class="chart-container"><canvas id="chartScatter"></canvas></div></div>';

    // ── 6. Upgrade Distribution ──
    html += '<div class="section"><h2>⬆️ Upgrade Distribution</h2><div class="chart-container"><canvas id="chartUpgrades"></canvas></div></div>';

    // ── Charts row: Event + Theme Pies ──
    html += '<div class="chart-row">';
    html += '<div class="section"><h2>⚡ Event Distribution</h2><canvas id="chartEvents"></canvas></div>';
    html += '<div class="section"><h2>🎨 Theme Usage</h2><canvas id="chartThemes"></canvas></div>';
    html += '</div>';

    // ── 9. Session Length Distribution ──
    html += '<div class="section"><h2>⏱️ Session Length Distribution</h2><div class="chart-container"><canvas id="chartHistogram"></canvas></div></div>';

    // ── 10. Raw Data ──
    html += '<div class="section"><h2>📦 Raw Data</h2>';
    html += '<button class="raw-toggle" onclick="toggleRaw()">Show / Hide Raw JSON</button>';
    html += '<div class="raw-content" id="rawContent">';
    html += '<div style="margin-bottom:10px;">';
    html += '<button class="btn" onclick="copyRaw()">📋 Copy to Clipboard</button>';
    html += '<button class="btn btn-danger" onclick="clearAnalytics()">🗑️ Clear Analytics</button>';
    html += '</div>';
    html += '<pre class="json-view" id="rawJson"></pre>';
    html += '</div></div>';

    dash.innerHTML = html;

    // Populate raw JSON
    const rawEl = document.getElementById('rawJson');
    if (rawEl) {
        try { rawEl.textContent = JSON.stringify(data, null, 2); }
        catch { rawEl.textContent = 'Unable to serialize data'; }
    }

    // Attach sort handlers
    document.querySelectorAll('#sessionTable th').forEach(th => {
        th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (sortCol === col) sortDir *= -1;
            else { sortCol = col; sortDir = 1; }
            render();
        });
    });

    // ── Draw charts (next frame for DOM to settle) ──
    requestAnimationFrame(() => {
        drawHBarChart('chartBuildings', agg.buildingTypeCounts, COLORS, 110);
        drawFunnel('chartFunnel', agg.milestoneReachTimes, agg.quitPoints);
        drawScatter('chartScatter', agg.quitPoints);
        drawStackedBar('chartUpgrades', agg.upgradeDistribution);
        drawPieChart('chartEvents', agg.eventTypeHistory, {
            positive: '#00e676', negative: '#f44336', neutral: '#ffc107'
        }, false);
        drawPieChart('chartThemes', agg.themeUsage, THEME_COLORS, false);
        drawHistogram('chartHistogram', sessions);
    });
}

function card(label, value, sub) {
    return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}

// ─── Global actions ─────────────────────────────────────────────────────
function toggleRaw() {
    const el = document.getElementById('rawContent');
    if (el) el.classList.toggle('open');
}

function copyRaw() {
    const raw = localStorage.getItem('okrMinerAnalytics') || '{}';
    navigator.clipboard.writeText(raw).then(() => {
        alert('Analytics JSON copied to clipboard!');
    }).catch(() => {
        const el = document.getElementById('rawJson');
        if (el) { const range = document.createRange(); range.selectNode(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); document.execCommand('copy'); }
    });
}

function clearAnalytics() {
    if (confirm('⚠️ This will permanently delete all analytics data.\n\nAre you sure?')) {
        if (confirm('Really? This cannot be undone!')) {
            localStorage.removeItem('okrMinerAnalytics');
            render();
        }
    }
}

// ─── Init & auto-refresh ────────────────────────────────────────────────
render();

let refreshCounter = 5;
setInterval(() => {
    refreshCounter--;
    if (refreshCounter <= 0) {
        render();
        refreshCounter = 5;
        const badge = document.getElementById('refreshBadge');
        if (badge) { badge.style.color = '#00e676'; setTimeout(() => { badge.style.color = ''; }, 300); }
    }
    const timer = document.getElementById('refreshTimer');
    if (timer) timer.textContent = 'Auto-refresh: ' + refreshCounter + 's';
}, 1000);

// Handle resize
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 200);
});
</script>
</body>
</html>
